<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nova Minds</title>
<style>
  :root{
    --bg:#0e1b2c; --bg2:#12243b; --card:#16304d;
    --line:#244563; --ink:#eaf2ff; --muted:#8fa6c4;
    --gold:#ffc233; --gold2:#ffd970; --cyan:#36d1dc; --cyan2:#5be7f0;
    --green:#3ddc97; --red:#ff6b6b; --purple:#a78bfa;
    --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;}
  html{height:auto;}
  body{
    font-family:'Trebuchet MS','Segoe UI',system-ui,-apple-system,sans-serif;
    background:radial-gradient(1200px 800px at 70% -10%, #1c3a5e 0%, var(--bg) 55%), var(--bg);
    color:var(--ink); overflow-x:hidden; overflow-y:auto; -webkit-overflow-scrolling:touch;
    -webkit-user-select:none; user-select:none;
  }
  .wrap{max-width:680px;margin:0 auto;padding:18px 18px 80px;min-height:100%;}
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:.3px;}
  .logo{font-size:34px;text-align:center;margin:8px 0 2px;
    background:linear-gradient(90deg,var(--gold),var(--cyan2));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .logo small{display:block;font-size:13px;letter-spacing:3px;color:var(--muted);
    -webkit-text-fill-color:var(--muted);font-weight:600;margin-top:2px;}
  .card{background:linear-gradient(180deg,var(--card),var(--bg2));
    border:1px solid var(--line);border-radius:var(--r);padding:18px;margin:14px 0;
    box-shadow:0 10px 30px rgba(0,0,0,.35);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .btn{background:linear-gradient(180deg,var(--cyan2),var(--cyan));color:#05222a;
    font-weight:800;font-size:18px;padding:16px;border-radius:14px;width:100%;
    box-shadow:0 6px 0 #1c9aa6;transition:transform .05s, box-shadow .05s;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #1c9aa6;}
  .btn.gold{background:linear-gradient(180deg,var(--gold2),var(--gold));color:#3a2a00;box-shadow:0 6px 0 #c9920a;}
  .btn.gold:active{box-shadow:0 2px 0 #c9920a;}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none;font-size:16px;}
  .btn.ghost:active{transform:translateY(2px);}
  .btn.sm{font-size:15px;padding:12px;}
  .muted{color:var(--muted);}
  .center{text-align:center;}
  .hide{display:none!important;}

  /* profile chips */
  .kid{position:relative;background:linear-gradient(180deg,var(--card),var(--bg2));
    border:2px solid var(--line);border-radius:20px;padding:20px 12px;text-align:center;
    transition:transform .08s, border-color .15s;}
  .kid:active{transform:scale(.97);}
  .kid .avatar{font-size:46px;line-height:1;}
  .kid .name{font-weight:800;margin-top:8px;font-size:18px;}
  .kid .stars{color:var(--gold);font-weight:700;font-size:13px;margin-top:4px;}
  .add{border-style:dashed;color:var(--muted);}

  /* pin pad */
  .pin-dots{display:flex;gap:14px;justify-content:center;margin:18px 0;}
  .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--cyan);}
  .dot.on{background:var(--cyan);}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:320px;margin:0 auto;}
  .key{background:var(--card);border:1px solid var(--line);border-radius:16px;
    font-size:26px;font-weight:800;color:var(--ink);padding:18px;}
  .key:active{background:var(--bg2);transform:scale(.95);}

  /* quiz */
  .qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .pill{background:var(--bg2);border:1px solid var(--line);border-radius:999px;
    padding:6px 14px;font-weight:700;font-size:14px;}
  .pill.timer{color:var(--gold);}
  .progress{height:10px;background:var(--bg2);border-radius:999px;overflow:hidden;margin:10px 0 4px;}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));width:0;transition:width .3s;}
  .question{font-size:54px;font-weight:800;text-align:center;margin:26px 0;letter-spacing:1px;}
  .answer{font-size:40px;text-align:center;font-weight:800;background:var(--bg2);
    border:2px solid var(--line);border-radius:16px;padding:14px;min-height:70px;
    color:var(--gold2);letter-spacing:3px;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
  .opt{background:var(--card);border:2px solid var(--line);border-radius:16px;
    font-size:26px;font-weight:800;color:var(--ink);padding:20px;}
  .opt:active{transform:scale(.96);}
  .opt.good{background:var(--green);color:#05291b;border-color:var(--green);}
  .opt.bad{background:var(--red);color:#3a0000;border-color:var(--red);}
  .feedback{text-align:center;font-size:22px;font-weight:800;min-height:30px;margin-top:14px;}
  .feedback.good{color:var(--green);}
  .feedback.bad{color:var(--red);}

  /* results */
  .big{font-size:60px;font-weight:800;text-align:center;
    background:linear-gradient(90deg,var(--gold),var(--cyan2));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .statline{display:flex;justify-content:space-between;padding:10px 4px;border-bottom:1px solid var(--line);}
  .statline:last-child{border-bottom:none;}

  /* range setup */
  label.lbl{display:block;font-weight:700;margin:14px 0 6px;}
  input[type=number]{width:90px;font-size:22px;font-weight:800;text-align:center;
    background:var(--bg2);border:2px solid var(--line);border-radius:12px;color:var(--ink);padding:10px;}
  .seg{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{background:var(--bg2);border:1px solid var(--line);border-radius:999px;
    padding:10px 16px;font-weight:700;font-size:15px;color:var(--ink);}
  .chip.on{background:var(--cyan);color:#05222a;border-color:var(--cyan);}

  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .back{background:var(--bg2);border:1px solid var(--line);border-radius:12px;
    color:var(--ink);font-size:20px;font-weight:800;padding:8px 14px;}
  .spacer{flex:1;}

  /* mode menu */
  .modecard{display:flex;align-items:center;gap:16px;text-align:left;background:linear-gradient(180deg,var(--card),var(--bg2));
    border:1px solid var(--line);border-radius:18px;padding:18px;width:100%;color:var(--ink);margin-bottom:12px;}
  .modecard:active{transform:scale(.98);}
  .modecard .ico{font-size:36px;}
  .modecard .t{font-weight:800;font-size:19px;}
  .modecard .d{color:var(--muted);font-size:13px;margin-top:2px;}
  .lock{margin-left:auto;color:var(--muted);font-size:13px;font-weight:700;}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);
    background:var(--purple);color:#fff;font-weight:800;padding:14px 22px;border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:50;opacity:0;transition:opacity .3s;}
  .toast.show{opacity:1;}

  .bubble{position:absolute;bottom:-70px;width:64px;height:64px;border-radius:50%;
    border:none;color:#05222a;font-size:22px;font-weight:800;
    box-shadow:0 4px 12px rgba(0,0,0,.4), inset 0 -6px 10px rgba(0,0,0,.15);
    animation:rise var(--dur,5s) linear forwards;}
  .bubble:active{transform:scale(.9);}
  @keyframes rise{ from{bottom:-70px;} to{bottom:110%;} }

  @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
  /* fraction typed answer */
  .fracInput{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 6px}
  .fracInput input{width:90px;height:64px;font-size:34px;font-weight:800;text-align:center;
    background:var(--bg2);border:2px solid var(--line);border-radius:12px;color:var(--gold2);}
  .fracInput .bar{width:90px;height:4px;background:var(--ink);margin:6px 0;border-radius:2px}
  .fracBig{font-size:40px;font-weight:800;display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;line-height:1.05}
  .fracBig .b{border-top:3px solid currentColor;padding-top:2px}

  /* realistic balloons */
  .balloon{position:absolute;bottom:-90px;width:62px;height:78px;border-radius:50% 50% 48% 48%;
    box-shadow:inset -10px -12px 18px rgba(0,0,0,.22), inset 8px 8px 14px rgba(255,255,255,.35);
    animation:floatUp var(--dur,5s) linear forwards;cursor:pointer;border:none;
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;
    text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .balloon::after{content:"";position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
    border-left:6px solid transparent;border-right:6px solid transparent;border-top:9px solid inherit;}
  .balloon .knot{position:absolute;bottom:-7px;left:50%;width:8px;height:8px;transform:translateX(-50%) rotate(45deg);background:inherit;border-radius:2px}
  .balloon .string{position:absolute;bottom:-46px;left:50%;width:2px;height:42px;background:rgba(255,255,255,.5);transform:translateX(-50%);}
  @keyframes floatUp{ from{bottom:-90px;} to{bottom:115%;} }
  @keyframes popIn{ 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.25)} 100%{transform:scale(1);opacity:1} }
  @keyframes dropIn{ 0%{transform:translateY(-40px) scale(.4);opacity:0} 70%{transform:translateY(4px) scale(1.15);opacity:1} 100%{transform:translateY(0) scale(1);opacity:1} }
  @keyframes flyIn{ 0%{transform:translateY(-60px) rotate(-20deg);opacity:0} 100%{transform:translateY(0) rotate(0);opacity:1} }
  .balloon.sway{animation:floatUp var(--dur,5s) linear forwards, sway 2.2s ease-in-out infinite;}
  @keyframes sway{0%,100%{margin-left:0}50%{margin-left:14px}}
  .pop{position:absolute;font-size:34px;animation:popfx .5s ease-out forwards;pointer-events:none}
  @keyframes popfx{0%{transform:scale(.4);opacity:1}100%{transform:scale(1.8);opacity:0}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============ Math Quest — offline, device-only storage ============ */
const STORE_KEY = "mathquest_v1";
const AVATARS = ["🦊","🐯","🐼","🦁","🐸","🐙","🦄","🐧","🐲","🦉","🐝","🐶"];
// Sticker collection — each unlocks at a star milestone (every 25 stars)
const STICKERS = ["🐢","🦋","🐬","🦜","🦩","🐳","🦦","🦥","🐉","🦚","🦈","🐅","🦓","🦒","🐘","🦌","🦢","🐊","🦅","🦉"];
const STICKER_STEP = 25;
function stickerGoalReached(k){
  // how many stickers the kid has earned by total stars
  return Math.min(STICKERS.length, Math.floor(k.stars / STICKER_STEP));
}
function checkStickers(k){
  const earned = stickerGoalReached(k);
  k.stickers = k.stickers || [];
  const newOnes=[];
  while(k.stickers.length < earned){
    newOnes.push(STICKERS[k.stickers.length]);
    k.stickers.push(STICKERS[k.stickers.length]);
  }
  return newOnes; // array of newly unlocked stickers (usually 0 or 1)
}

/* ---- Coins & shop ---- */
// coins earned per correct answer, scaled by the speed-drill setting
function coinsForSpeed(sec){
  if(sec<=3) return 5;
  if(sec<=5) return 3;
  if(sec<=8) return 2;
  return 1;
}
function award(k, correct, coins){
  // correct answer: 1 star always; coins default 1, or a scaled amount in speed drills
  if(correct){
    k.stars++; k.coins=(k.coins||0)+(coins!=null?coins:1);
    if(coins && coins>=3) SND.coin(); else SND.correct();
  }
}
const SHOP_AVATARS = ["🐵","🐰","🐺","🦝","🐹","🐱","🐮","🐷","🐗","🦔","🐭","🐔","🦇","🦅","🦈","🐊"];
const AVATAR_COST = 100;
function ownsAvatar(k,a){ return (k.avatarsOwned||[]).includes(a); }

/* Tiered premium stickers: Common -> Rare -> Epic -> Legendary */
const TIERS=[
  {tier:"Common",   cost:200,  color:"#7fa6c9"},
  {tier:"Rare",     cost:450,  color:"#4fc3f7"},
  {tier:"Epic",     cost:900,  color:"#b388ff"},
  {tier:"Legendary",cost:1800, color:"#ffca28"}
];
const SHOP_STICKERS=[
  // Common
  {id:"c1",emoji:"🌟",tier:0,name:"Gold Star"},{id:"c2",emoji:"🍀",tier:0,name:"Lucky Clover"},
  {id:"c3",emoji:"🎈",tier:0,name:"Balloon"},{id:"c4",emoji:"🌈",tier:0,name:"Rainbow"},
  // Rare
  {id:"r1",emoji:"🦄",tier:1,name:"Unicorn"},{id:"r2",emoji:"🚀",tier:1,name:"Rocket"},
  {id:"r3",emoji:"🐉",tier:1,name:"Dragon"},{id:"r4",emoji:"⚡",tier:1,name:"Lightning"},
  // Epic
  {id:"e1",emoji:"👑",tier:2,name:"Crown"},{id:"e2",emoji:"💎",tier:2,name:"Diamond"},
  {id:"e3",emoji:"🔥",tier:2,name:"Phoenix Fire"},{id:"e4",emoji:"🌌",tier:2,name:"Galaxy"},
  // Legendary
  {id:"L1",emoji:"🏆",tier:3,name:"Champion Trophy"},{id:"L2",emoji:"🦖",tier:3,name:"T‑Rex"},
  {id:"L3",emoji:"🛸",tier:3,name:"UFO"},{id:"L4",emoji:"🐲",tier:3,name:"Mega Dragon"}
];
function ownsSticker(k,id){ return (k.shopStickers||[]).includes(id); }

let _memFallback = false;
const PARENT_CODE = "246810";  // 6-digit code to enter the Parent area
let DB = load();
migrateDB();
function load(){
  try{
    const raw = window.localStorage.getItem(STORE_KEY);
    return raw ? (JSON.parse(raw) || {kids:[]}) : {kids:[]};
  }
  catch(e){ _memFallback = true; return {kids:[]}; }
}
/* Backfill fields added in later versions so older saved kids don't crash */
function migrateDB(){
  (DB.kids||[]).forEach(k=>{
    if(k.coins==null) k.coins=0;
    if(!k.avatarsOwned) k.avatarsOwned=[k.avatar];
    if(!k.levelsUnlocked) k.levelsUnlocked=["tables"];
    if(!k.stageProgress) k.stageProgress={};
    if(!k.lessonsSeen) k.lessonsSeen={};
    if(!k.belts) k.belts={};
    if(k.streak==null) k.streak=0;
    if(!k.stickers) k.stickers=[];
    if(!k.shopStickers) k.shopStickers=[];
    if(!k.range) k.range={min:1,max:12};
    if(k.speedSec==null) k.speedSec=5;
    if(k.fracSpeedSec==null) k.fracSpeedSec=8;
    if(!k.history) k.history=[];
    if(!k.facts) k.facts={};
    if(k.stars==null) k.stars=0;
    if(!k.stageSpeed) k.stageSpeed={};  // levelId:stageIdx -> true once speed drill passed
    if(!k.introSeen) k.introSeen={};
    if(!k.science) k.science={};
    // Kids who already cleared any stage in a level have clearly seen the concept —
    // don't force them to watch the intro (only brand-new learners get gated).
    ["tables","division"].forEach(lid=>{
      if(k.stageProgress && k.stageProgress[lid]!=null && k.stageProgress[lid]>=0) k.introSeen[lid]=true;
    });
  });
  // Tombstones for deleted players (synced across devices)
  if(!DB.deletedIds) DB.deletedIds={};
  DB.kids=(DB.kids||[]).filter(k=>!DB.deletedIds[k.id]);
  // One-time economy reset: zero all coins when upgrading to the new pricing
  if(DB.econVersion!==2){
    (DB.kids||[]).forEach(k=>{ k.coins=0; });
    DB.econVersion=2;
    try{ window.localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }catch(e){}
  }
}
function save(){
  try{ window.localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }
  catch(e){
    // Safari Private Mode / blocked storage: keep working in memory this session
    if(!_memFallback){ _memFallback = true; }
  }
}

/* ====================== CLOUD SYNC (Google Apps Script) ====================== */
const SYNC_URL = "https://script.google.com/macros/s/AKfycbyADIs90VmOGdLu1JtFr_bvNXZF_5-uRkNeZ5OCbb4HR5xeuApXCDSsj7cU_VdXNOI/exec";
let _syncQueue = [];   // kid ids waiting to push when offline
let _online = true;

// stamp a kid as just-modified (used to resolve newest-wins conflicts)
function stamp(k){ k.updatedAt = Date.now(); }

// Push one kid up to the sheet. Fire-and-forget; queues on failure.
function syncKid(k){
  if(!k) return;
  if(DB.deletedIds && DB.deletedIds[k.id]) return;  // never re-push a deleted player
  stamp(k); save();
  try{
    fetch(SYNC_URL, {
      method:"POST",
      // text/plain avoids a CORS preflight that Apps Script doesn't answer
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify(k)
    }).then(()=>{ _online=true; flushQueue(); })
      .catch(()=>{ _online=false; queuePush(k.id); });
  }catch(e){ queuePush(k.id); }
}
function queuePush(id){ if(_syncQueue.indexOf(id)<0) _syncQueue.push(id); }
function flushQueue(){
  if(!_syncQueue.length) return;
  const ids=_syncQueue.slice(); _syncQueue=[];
  ids.forEach(id=>{ const k=DB.kids.find(x=>x.id===id); if(k) syncKid(k); });
}

// Pull all kids from the sheet and merge into local DB (newest updatedAt wins).
function syncPull(cb){
  let done=false;
  const finish=()=>{ if(done) return; done=true; cb&&cb(); };
  try{
    fetch(SYNC_URL, {method:"GET"})
      .then(r=>r.json())
      .then(remote=>{
        _online=true;
        if(remote && Array.isArray(remote.kids)){
          if(!DB.deletedIds) DB.deletedIds={};
          // 1) pull in the shared tombstone list (the special "__deleted__" row)
          const tombRow=remote.kids.find(x=>x && x.id==="__deleted__");
          if(tombRow && tombRow.deletedIds){
            Object.keys(tombRow.deletedIds).forEach(id=>{
              if(!DB.deletedIds[id]) DB.deletedIds[id]=tombRow.deletedIds[id];
            });
          }
          // 2) merge real kids, skipping the special row and anything tombstoned
          remote.kids.forEach(rk=>{
            if(!rk || rk.id==="__deleted__") return;       // skip the tombstone row
            if(DB.deletedIds[rk.id]) return;               // skip deleted players
            const local=DB.kids.find(x=>x.id===rk.id);
            if(!local){ DB.kids.push(rk); }
            else {
              const lu=local.updatedAt||0, ru=rk.updatedAt||0;
              if(ru>=lu){ Object.assign(local, rk); }
            }
          });
          // 3) drop any local kid that has since been tombstoned (deleted elsewhere)
          DB.kids=DB.kids.filter(k=>!DB.deletedIds[k.id]);
          migrateDB(); save();
        }
        finish();
      })
      .catch(()=>{ _online=false; finish(); });
  }catch(e){ _online=false; finish(); }
  // safety: don't hang the UI more than 4s waiting on the network
  setTimeout(finish, 4000);
}
/* ============================================================================ */

function newKid(name, avatar, pin){
  return {
    id: Date.now()+""+Math.floor(Math.random()*999),
    name, avatar, pin,
    range:{min:1,max:12},
    speedSec:5,
    fracSpeedSec:8,
    stars:0,
    coins:0,                     // earned per correct answer; spent in shop
    stickers:[],
    shopStickers:[],             // premium stickers bought with coins
    avatarsOwned:[avatar],       // avatars unlocked (starts with their chosen one)
    levelsUnlocked:["tables"],
    stageProgress:{},            // levelId -> index of highest CLEARED stage (-1 = none)
    stageSpeed:{},               // "levelId:stageIdx" -> true once speed drill passed
    introSeen:{},                // "levelId" -> true once the animated intro is watched
    science:{},                  // "topicId" -> {explored:true, quizPassed:true}
    lessonsSeen:{},              // "levelId:stageIdx" -> true
    belts:{},                    // levelId -> belt index reached
    streak:0,                    // consecutive days
    lastWarmup:null,
    history:[],
    facts:{}
  };
}

/* ---- Belts ---- */
const BELTS = ["White","Yellow","Orange","Green","Blue","Purple","Brown","Black"];
const BELT_COLORS = ["#e8e8e8","#ffd93d","#ff9a3d","#4caf50","#2196f3","#9c27b0","#795548","#222"];

/* ---- Stages per level ----
   Each stage focuses on one factor/divisor; final stage is mixed mastery. */
function stagesFor(levelId){
  if(levelId==="tables"){
    return [
      {f:2,name:"The 2s"},{f:10,name:"The 10s"},{f:5,name:"The 5s"},{f:3,name:"The 3s"},
      {f:4,name:"The 4s"},{f:11,name:"The 11s"},{f:6,name:"The 6s"},{f:7,name:"The 7s"},
      {f:8,name:"The 8s"},{f:9,name:"The 9s"},{f:12,name:"The 12s"},{f:0,name:"Mixed Mastery",mixed:true}
    ];
  }
  if(levelId==="division"){
    return [
      {f:2,name:"÷2"},{f:10,name:"÷10"},{f:5,name:"÷5"},{f:3,name:"÷3"},
      {f:4,name:"÷4"},{f:11,name:"÷11"},{f:6,name:"÷6"},{f:7,name:"÷7"},
      {f:8,name:"÷8"},{f:9,name:"÷9"},{f:12,name:"÷12"},{f:0,name:"Mixed Mastery",mixed:true}
    ];
  }
  if(levelId==="fractions"){
    return FRACTION_STAGES.map(s=>({name:s.name, kind:s.kind, mixed:!!s.mixed}));
  }
  if(levelId==="factors"){
    return FACTOR_STAGES.map(s=>({name:s.name, kind:s.kind, mixed:!!s.mixed}));
  }
  if(levelId==="fracops"){
    return FRACOP_STAGES.map(s=>({name:s.name, kind:s.kind, mixed:!!s.mixed}));
  }
  if(levelId==="decimals"){
    return DECIMAL_STAGES.map(s=>({name:s.name, kind:s.kind, mixed:!!s.mixed}));
  }
  return [];
}
function clearedStage(k,levelId){ return (k.stageProgress&&k.stageProgress[levelId]!=null)?k.stageProgress[levelId]:-1; }
function beltFor(k,levelId){
  const stages=stagesFor(levelId); if(!stages.length) return 0;
  const cleared=clearedStage(k,levelId)+1; // count cleared
  // map cleared count (0..stages.length) onto belt index (0..7)
  return Math.min(BELTS.length-1, Math.round((cleared/stages.length)*(BELTS.length-1)));
}

/* ================= SOUND ENGINE (synthesised, no files, offline) ================= */
const SND = {
  ctx:null, muted:false,
  init(){
    if(this.ctx) return;
    try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ this.ctx=null; }
    this.muted = (localStorage.getItem('mq_muted')==='1');
  },
  setMuted(m){ this.muted=m; try{ localStorage.setItem('mq_muted', m?'1':'0'); }catch(e){} },
  // play a single tone
  tone(freq, dur, type, vol, when){
    if(!this.ctx || this.muted) return;
    const t=this.ctx.currentTime+(when||0);
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol||0.2, t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t+dur+0.02);
  },
  // a quick noise burst (for balloon pop)
  noise(dur, vol){
    if(!this.ctx || this.muted) return;
    const t=this.ctx.currentTime;
    const n=Math.floor(this.ctx.sampleRate*dur);
    const buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<n;i++){ d[i]=(Math.random()*2-1)*(1-i/n); }
    const s=this.ctx.createBufferSource(); s.buffer=buf;
    const g=this.ctx.createGain(); g.gain.value=vol||0.3;
    s.connect(g); g.connect(this.ctx.destination); s.start(t);
  },
  pop(){ this.init(); this.noise(0.09,0.25); this.tone(420,0.08,'triangle',0.18); },
  correct(){ this.init(); this.tone(660,0.10,'sine',0.2); this.tone(880,0.12,'sine',0.18,0.09); },
  wrong(){ this.init(); this.tone(200,0.18,'sawtooth',0.14); },
  tap(){ this.init(); this.tone(520,0.05,'square',0.10); },
  clear(){ this.init(); [523,659,784].forEach((f,i)=>this.tone(f,0.18,'triangle',0.2,i*0.10)); }, // C-E-G
  master(){ this.init(); [523,659,784,1047].forEach((f,i)=>this.tone(f,0.28,'triangle',0.22,i*0.12)); // C-E-G-C fanfare
    [392,523].forEach((f,i)=>this.tone(f,0.3,'sine',0.12,i*0.12)); },
  coin(){ this.init(); this.tone(988,0.07,'square',0.14); this.tone(1319,0.10,'square',0.12,0.06); },
  // spoken narration (built-in voice, offline, no files)
  // pick the best-sounding kid-friendly voice available on this device, once
  _voice:undefined,
  pickVoice(){
    if(this._voice!==undefined) return this._voice;
    let voices=[];
    try{ voices=window.speechSynthesis.getVoices()||[]; }catch(e){}
    if(!voices.length){ return null; } // not loaded yet; try again next time
    // rank: premium/natural English voices first, then nice named ones, then any English
    const score=(v)=>{
      const n=(v.name||"").toLowerCase(), l=(v.lang||"").toLowerCase();
      let s=0;
      if(/en/.test(l)) s+=5;
      if(/en-gb|en-au/.test(l)) s+=2;                          // British/Aussie read well for kids
      if(/natural|neural|premium|enhanced|siri/.test(n)) s+=8; // high-quality engines
      if(/google/.test(n)) s+=6;                               // Google voices are warm
      if(/samantha|karen|moira|tessa|fiona|aria|jenny|libby|sonia/.test(n)) s+=4; // friendly named voices
      if(/female/.test(n)) s+=2;
      if(/compact|eloquence|albert|zarvox|comic/.test(n)) s-=6; // avoid the robotic legacy ones
      return s;
    };
    voices=voices.slice().sort((a,b)=>score(b)-score(a));
    this._voice = voices[0] || null;
    return this._voice;
  },
  // speak a line with energy: split into phrases, vary pitch/rate, lift questions & exclamations
  say(text){
    if(this.muted) return;
    try{
      if(!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const voice=this.pickVoice();
      // break into phrases at sentence marks and commas for natural rhythm
      const phrases=text.match(/[^.!?,]+[.!?,]?/g)||[text];
      phrases.forEach((raw)=>{
        const p=raw.trim(); if(!p) return;
        const u=new SpeechSynthesisUtterance(p);
        if(voice) u.voice=voice;
        u.volume=1;
        // base liveliness
        let rate=1.02, pitch=1.18;
        if(/[!]/.test(p)){ rate=1.12; pitch=1.34; }          // excited!
        else if(/[?]/.test(p)){ rate=1.0; pitch=1.28; }       // curious, rising
        else if(/,$/.test(p)){ rate=1.05; pitch=1.16; }       // mid-thought, keep momentum
        // emphasise short punchy phrases (often the key idea)
        if(p.split(" ").length<=3){ pitch+=0.08; rate-=0.04; }
        // gentle natural variation so it never sounds flat/identical
        pitch += (Math.random()*0.06-0.03);
        rate  += (Math.random()*0.04-0.02);
        u.rate=Math.max(0.85,Math.min(1.25,rate));
        u.pitch=Math.max(1.0,Math.min(1.5,pitch));
        window.speechSynthesis.speak(u); // queues; phrases play in order with tiny natural gaps
      });
    }catch(e){}
  },
  stopSpeech(){ try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(e){} }
};

  _devTaps++;

  if(_devTaps>=7){

  const t=$("toast"); t.textContent=msg; t.classList.add("show");

}

  app.innerHTML=`

    ${lv.id!=="fractions"?`

// animated equal groups: G groups, each a CLEAR labelled container with N items inside
function introGroupsAnim(G, N, containerEmoji, item, label){
  let groups="";
  for(let g=0; g<G; g++){
    let items="";
    for(let i=0;i<N;i++){
      const delay=0.4 + (g*N+i)*0.4; // slower, clearly one-at-a-time
      items+=`<span style="display:inline-block;font-size:24px;margin:1px;animation:dropIn .5s ${delay.toFixed(2)}s both">${item}</span>`;
    }
    groups+=`<div style="display:inline-flex;flex-direction:column;align-items:center;margin:6px;padding:10px;
        background:rgba(255,255,255,.04);border:2px dashed var(--gold);border-radius:16px;min-width:84px">
      <div style="font-size:13px;color:var(--gold2);font-weight:700;margin-bottom:4px">${label} ${g+1}</div>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;max-width:96px;gap:1px">${items}</div>
    </div>`;
  }
  return `<div style="display:flex;flex-wrap:wrap;justify-content:center;margin:12px 0">${groups}</div>`;
}
// animated array build: R rows x C cols of dots
function introArrayAnim(R,C){
  let cells="";
  for(let r=0;r<R;r++) for(let c=0;c<C;c++){
    const delay=0.3 + (r*C+c)*0.18;
    cells+=`<span style="display:inline-block;width:28px;height:28px;margin:3px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ff8a8a,#e0444b);animation:dropIn .45s ${delay.toFixed(2)}s both"></span>`;
  }
  return `<div style="display:grid;grid-template-columns:repeat(${C},34px);justify-content:center;margin:14px auto">${cells}</div>`;
}
// static array grid (for the flip comparison)
function arrayGrid(R,C){
  let cells="";
  for(let r=0;r<R;r++) for(let c=0;c<C;c++){
    cells+=`<span style="display:inline-block;width:20px;height:20px;margin:2px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe07a,#e0a800)"></span>`;
  }
  return `<div style="display:grid;grid-template-columns:repeat(${C},24px);justify-content:center">${cells}</div>`;
}
// animated sharing: deal cookies onto clearly-drawn PLATES one at a time (cookies DROP in)
function introShareAnim(total, plates){
  const per=Math.floor(total/plates);
  let cols="";
  for(let p=0;p<plates;p++){
    let cookies="";
    for(let i=0;i<per;i++){
      const dealOrder=i*plates+p; // round-robin dealing order
      const delay=0.4 + dealOrder*0.45; // slower, clearly one-at-a-time, starts after a beat
      cookies+=`<span style="display:inline-block;font-size:22px;margin:1px;animation:dropIn .5s ${delay.toFixed(2)}s both">🍪</span>`;
    }
    cols+=`<div style="display:inline-flex;flex-direction:column;align-items:center;margin:6px">
      <div style="font-size:12px;color:var(--gold2);font-weight:700;margin-bottom:3px">Plate ${p+1}</div>
      <div style="width:96px;min-height:64px;display:flex;flex-wrap:wrap;justify-content:center;align-content:center;gap:2px;
        background:radial-gradient(circle,#eef3fa,#c9d6e8);border:3px solid #9fb3cc;border-radius:50%;padding:6px;box-shadow:inset 0 2px 6px rgba(0,0,0,.15)">
        ${cookies}</div></div>`;
  }
  return `<div style="display:flex;justify-content:center;flex-wrap:wrap;margin:12px 0">${cols}</div>`;
}

    {q:"Does sugar disappear when it dissolves?", choices:["No, it's still there","Yes, forever","It turns into water"], ans:"No, it's still there"},
    {q:"A balloon filled with air floats up because air is...", choices:["Light for its size","Heavy","Solid"], ans:"Light for its size"},
    {q:"Which does NOT dissolve in water?", choices:["A pebble","Sugar","Salt"], ans:"A pebble"}
  ];
}
function startSciQuiz(id){
  const bank=scienceQuiz(id).slice();
  // shuffle the bank
  for(let i=bank.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [bank[i],bank[j]]=[bank[j],bank[i]]; }
  // longer quiz: aim for 25; if the bank is smaller, reshuffle & continue so kids get 25 questions
  const target=25;
  let qs=[];
  while(qs.length<target){
    const batch=bank.slice();
    for(let i=batch.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [batch[i],batch[j]]=[batch[j],batch[i]]; }
    qs=qs.concat(batch);
  }
  qs=qs.slice(0,target);
  qs.forEach(q=>{ q.shuffled=q.choices.slice().sort(()=>Math.random()-.5); });
  session.sciQuiz={id, qs, idx:0, correct:0, locked:false};
  sciQuizNext();
}
function sciQuizNext(){
  const Q=session.sciQuiz;
  if(Q.idx>=Q.qs.length) return sciQuizEnd();
  Q.locked=false;
  const q=Q.qs[Q.idx];
  app.innerHTML=`
    <div class="qtop"><button class="back" onclick="openScience('${Q.id}')">✕</button>
      <span class="pill" style="color:var(--gold)">📝 Quiz</span>
      <span class="pill">${Q.idx+1} / ${Q.qs.length}</span></div>
    <div class="progress"><div style="width:${(Q.idx/Q.qs.length)*100}%"></div></div>
    <div class="question" style="margin:16px 0">${q.q}</div>
    <div class="opts" style="flex-direction:column;gap:8px">
      ${q.shuffled.map(c=>`<button class="opt" style="width:100%" onclick="sciQuizAns(this,'${c.replace(/'/g,"\\'")}')">${c}</button>`).join("")}
    </div>
    <div class="feedback" id="fb"></div>`;
}
function sciQuizAns(el,val){
  const k=session.kid, Q=session.sciQuiz, q=Q.qs[Q.idx];
  if(Q.locked) return; Q.locked=true;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const fb=$("fb");
  if(val===q.ans){
    el.classList.add("good"); fb.textContent="Correct! 🎉"; fb.className="feedback good";
    Q.correct++; k.stars++; k.coins=(k.coins||0)+1; SND.correct();
  } else {
    el.classList.add("bad"); SND.wrong();
    document.querySelectorAll('.opt').forEach(b=>{ if(b.textContent===q.ans) b.classList.add("good"); });
    fb.textContent="Answer: "+q.ans; fb.className="feedback bad";
  }
  save(); Q.idx++;
  setTimeout(()=>sciQuizNext(), 1200);
}
function sciQuizEnd(){
  const k=session.kid, Q=session.sciQuiz;
  const passed=Q.correct >= Math.ceil(Q.qs.length*0.8); // 80% to pass (e.g. 20/25)
  if(passed){
    if(!k.science[Q.id]) k.science[Q.id]={};
    if(!k.science[Q.id].quizPassed){ k.coins=(k.coins||0)+5; } // first-pass bonus
    k.science[Q.id].quizPassed=true; save(); syncNow(); SND.master();
  }
  app.innerHTML=`
    <div class="card center" style="border-color:${passed?'var(--green)':'var(--gold)'}">
      <div style="font-size:48px">${passed?'🎉🔬':'💪'}</div>
      <h2>${Q.correct} / ${Q.qs.length}</h2>
      <p class="muted">${passed?'You passed! Great science brain. 🌟'+((k.science[Q.id]&&k.science[Q.id].quizPassed)?' +5 🪙':''):'So close! Explore again and retry.'}</p>
    </div>
    <div class="card center">
      ${passed?'':`<button class="btn gold" onclick="startExplore('${Q.id}')">🔍 Explore again</button><div style="height:8px"></div>`}
      <button class="btn ${passed?'gold':'ghost'}" onclick="openScience('${Q.id}')">Back to topic</button>
      <div style="height:8px"></div>
      <button class="btn ghost" onclick="screenPath()">Home</button>
    </div>`;
}

      <p style="font-size:16px;text-align:center;margin:12px 0">0.5 = <span class="fracBig"><span>5</span><span class="b">10</span></span> = <span class="fracBig"><span>1</span><span class="b">2</span></span> &nbsp;·&nbsp; 0.25 = <span class="fracBig"><span>1</span><span class="b">4</span></span></p>
      <p style="font-size:15px;line-height:1.55;margin:0">Tip: 0.5 is a half, 0.25 is a quarter, 0.1 is a tenth.</p>`;
  }
  if(kind==="dec_compare"){
    return `<p style="font-size:15px;line-height:1.6">To compare decimals, line up the dots and compare digit by digit, left to right.</p>
      <p style="font-size:16px;text-align:center;margin:12px 0">0.7 vs 0.65 → 0.70 vs 0.65 → <b>0.7 is bigger</b></p>
      <p style="font-size:15px;line-height:1.55;margin:0">Tip: 0.7 is the same as 0.70. The tenths decide first.</p>`;
  }
  if(kind==="pct_read"){
    return `<p style="font-size:15px;line-height:1.6"><b>Percent</b> means "out of 100". This grid has 100 squares.</p>
      <div class="center" style="margin:14px 0">${hundredGridSVG(30)}</div>
      <p style="font-size:15px;text-align:center;margin:0">30 of 100 shaded = <b>30%</b></p>`;
  }
  if(kind==="pct_frac"){
    return `<p style="font-size:15px;line-height:1.6">A percent is just a fraction out of 100.</p>
      <p style="font-size:16px;text-align:center;margin:12px 0">50% = <span class="fracBig"><span>50</span><span class="b">100</span></span> = <span class="fracBig"><span>1</span><span class="b">2</span></span> &nbsp;·&nbsp; 25% = <span class="fracBig"><span>1</span><span class="b">4</span></span></p>`;
  }
  if(kind==="pct_of"){
    return `<p style="font-size:15px;line-height:1.6">To find a percent of a number, turn the percent into a fraction (or decimal) and multiply.</p>
      <p style="font-size:16px;text-align:center;margin:12px 0">50% of 20 → half of 20 = <b>10</b><br>25% of 20 → quarter of 20 = <b>5</b></p>`;
  }
  if(kind==="convert"){
    return `<p style="font-size:15px;line-height:1.6">Fractions, decimals and percents are <b>three ways to say the same thing</b>.</p>
      <p style="font-size:15px;text-align:center;margin:12px 0">½ = 0.5 = 50%<br>¼ = 0.25 = 25%<br>⅕ = 0.2 = 20%</p>
      <p style="font-size:15px;line-height:1.55;margin:0">To get a percent from a decimal, multiply by 100 (move the dot two places).</p>`;
  }
  if(kind==="word"){
    return `<p style="font-size:15px;line-height:1.6">Word problems hide the maths in a story. Read carefully, find the numbers, and decide: is it a fraction, a percent, or "how many"?</p>
      <p style="font-size:15px;line-height:1.55;margin:8px 0 0"><b>Example:</b> "Sam ate 3 of 12 slices." → 3/12 = ¼ of the pizza.</p>`;
  }
  if(kind==="factors_of"){
    return `<p style="font-size:15px;line-height:1.6">A <b>factor</b> is a number that divides into another number <b>evenly</b> (no remainder).</p>
      <p style="font-size:15px;text-align:center;margin:12px 0">Factors of <b>12</b>: <b style="color:var(--gold2)">1, 2, 3, 4, 6, 12</b><br>
      <span class="muted" style="font-size:14px">because 1×12, 2×6, and 3×4 all make 12</span></p>
      <p style="font-size:15px;line-height:1.55;margin:0">Tip: check each number — does it divide in with nothing left over?</p>`;
  }
  if(kind==="is_factor"){
    return `<p style="font-size:15px;line-height:1.6">To check if a number is a factor, divide and see if it's <b>even</b> (no remainder).</p>
      <p style="font-size:15px;text-align:center;margin:12px 0">Is 4 a factor of 12? &nbsp;12 ÷ 4 = 3 ✅ <b>Yes!</b><br>Is 5 a factor of 12? &nbsp;12 ÷ 5 = 2 r2 ❌ <b>No</b></p>`;
  }
  if(kind==="hcf"){
    return `<p style="font-size:15px;line-height:1.6">The <b>Highest Common Factor (HCF)</b> is the <b>biggest</b> number that is a factor of <b>both</b> numbers.</p>
      <div style="background:rgba(255,255,255,.04);border:2px solid var(--line);border-radius:12px;padding:12px;margin:12px 0;font-size:14px;line-height:1.7">
        Factors of 12: 1, 2, 3, <b style="color:var(--gold2)">6</b>, 12<br>
        Factors of 18: 1, 2, 3, <b style="color:var(--gold2)">6</b>, 9, 18<br>
        Shared: 1, 2, 3, 6 → biggest is <b style="color:var(--gold2)">6</b></div>
      <p style="font-size:15px;line-height:1.55;margin:0">HCF helps you <b>simplify</b> fractions.</p>`;
  }
  if(kind==="multiples_of"){
    return `<p style="font-size:15px;line-height:1.6">A <b>multiple</b> is what you get when you <b>skip-count</b> (the answers in a times table).</p>
      <p style="font-size:15px;text-align:center;margin:12px 0">Multiples of <b>4</b>: <b style="color:var(--gold2)">4, 8, 12, 16, 20 …</b><br>
      <span class="muted" style="font-size:14px">4×1, 4×2, 4×3, 4×4 …</span></p>`;
  }
  if(kind==="is_multiple"){
    return `<p style="font-size:15px;line-height:1.6">A number is a <b>multiple</b> of another if you can reach it by skip-counting.</p>
      <p style="font-size:15px;text-align:center;margin:12px 0">Is 12 a multiple of 4? &nbsp;4, 8, <b style="color:var(--gold2)">12</b> ✅ <b>Yes!</b><br>Is 14 a multiple of 4? &nbsp;4, 8, 12, 16 — skipped 14 ❌ <b>No</b></p>`;
  }
  if(kind==="lcm"){
    return `<p style="font-size:15px;line-height:1.6">The <b>Lowest Common Multiple (LCM)</b> is the <b>smallest</b> number that is a multiple of <b>both</b> numbers.</p>
      <div style="background:rgba(255,255,255,.04);border:2px solid var(--line);border-radius:12px;padding:12px;margin:12px 0;font-size:14px;line-height:1.7">
        Multiples of 2: 2, 4, <b style="color:var(--gold2)">6</b>, 8 …<br>
        Multiples of 3: 3, <b style="color:var(--gold2)">6</b>, 9, 12 …<br>
        First shared one → <b style="color:var(--gold2)">6</b></div>
      <p style="font-size:15px;line-height:1.55;margin:0"><b>LCM is the key to adding fractions</b> — it's the common bottom!</p>`;
  }
  if(kind==="add_same"||kind==="sub_same"){
    const op=kind==="add_same"?"add":"subtract";
    const sym=kind==="add_same"?"+":"−";
    return `<p style="font-size:15px;line-height:1.6">When the <b>bottom numbers are the same</b>, just ${op} the <b>top numbers</b> and keep the bottom!</p>
      <p style="font-size:18px;text-align:center;margin:12px 0"><span class="fracBig"><span>1</span><span class="b">5</span></span> ${sym} <span class="fracBig"><span>2</span><span class="b">5</span></span> = <span class="fracBig"><span>${kind==="add_same"?3:1}</span><span class="b">5</span></span></p>
      <p style="font-size:15px;line-height:1.55;margin:0">The bottom stays 5 — we're counting fifths.</p>`;
  }
  if(kind==="add_diff"||kind==="sub_diff"){
    const sym=kind==="add_diff"?"+":"−";
    const word=kind==="add_diff"?"add":"subtract";
    const ans=kind==="add_diff"?5:1;
    return `<p style="font-size:15px;line-height:1.6">When bottoms are <b>different</b>, we rename each fraction so they share the <b>same bottom</b> (the <b>LCM</b> of the two bottoms). Whatever you multiply the bottom by, you <b>must multiply the top by the same number</b>.</p>
      <div style="background:rgba(255,255,255,.04);border:2px solid var(--line);border-radius:12px;padding:12px;margin:12px 0">
        <p style="font-size:14px;margin:0 0 8px;text-align:center">LCM of 2 and 3 is <b style="color:var(--gold2)">6</b>. Rename both to sixths:</p>
        <p style="font-size:15px;text-align:center;margin:6px 0;line-height:2">
          <span class="fracBig"><span>1</span><span class="b">2</span></span> = <span style="color:var(--gold2)">1×3</span> / <span style="color:var(--gold2)">2×3</span> = <span class="fracBig"><span>3</span><span class="b">6</span></span>
          &nbsp;&nbsp;&nbsp;
          <span class="fracBig"><span>1</span><span class="b">3</span></span> = <span style="color:var(--gold2)">1×2</span> / <span style="color:var(--gold2)">3×2</span> = <span class="fracBig"><span>2</span><span class="b">6</span></span></p>
      </div>
      <p style="font-size:16px;text-align:center;margin:10px 0">Now ${word} the tops, keep the bottom:<br>
        <span class="fracBig"><span>3</span><span class="b">6</span></span> ${sym} <span class="fracBig"><span>2</span><span class="b">6</span></span> = <span class="fracBig"><span>${ans}</span><span class="b">6</span></span></p>
      <p style="font-size:15px;line-height:1.55;margin:0"><b>Remember:</b> the top changes too! ½ became 3/6, not 1/6. Multiply top and bottom by the <b>same</b> number.</p>`;
  }
  if(kind==="mul"){
    return `<p style="font-size:15px;line-height:1.6">Multiplying is the <b>easiest</b>! Just multiply the <b>tops together</b> and the <b>bottoms together</b>.</p>
      <p style="font-size:18px;text-align:center;margin:12px 0"><span class="fracBig"><span>2</span><span class="b">3</span></span> × <span class="fracBig"><span>1</span><span class="b">4</span></span> = <span class="fracBig"><span>2×1</span><span class="b">3×4</span></span> = <span class="fracBig"><span>2</span><span class="b">12</span></span></p>
      <p style="font-size:15px;line-height:1.55;margin:0">No common denominator needed. (You can simplify the answer for a bonus!)</p>`;
  }
  if(kind==="div"){
    return `<p style="font-size:15px;line-height:1.6">To divide, <b>flip the second fraction</b> and multiply (this is called "keep, change, flip").</p>
      <p style="font-size:17px;text-align:center;margin:12px 0"><span class="fracBig"><span>1</span><span class="b">2</span></span> ÷ <span class="fracBig"><span>1</span><span class="b">4</span></span> = <span class="fracBig"><span>1</span><span class="b">2</span></span> × <span class="fracBig"><span>4</span><span class="b">1</span></span> = <span class="fracBig"><span>4</span><span class="b">2</span></span> = 2</p>
      <p style="font-size:15px;line-height:1.55;margin:0">Keep the first, change ÷ to ×, flip the second.</p>`;
  }
  return `<p style="font-size:15px;line-height:1.6">Now you'll show a fraction yourself. Read the numbers and type them into the fraction box — top number on top, bottom number on the bottom.</p>
      <div class="center" style="margin:14px 0">${fracPieSVG(1,3)}</div>
      <p style="font-size:15px;text-align:center;margin:0">One part out of three → <span class="fracBig"><span>1</span><span class="b">3</span></span></p>`;
}

function startFracTest(gentle){
  const k=session.kid, lv=session.level, st=session.stage, s=st.def;
  const kind = s.mixed?"any":s.kind;
  session.ftest={lv, stage:st, kind, attempt:1, maxAttempts:4, queue:null, missed:[], correct:0, total:10, gentle:!!gentle};
  fracTestBuild(true);
}
function fracTestBuild(fresh){
  const t=session.ftest;
  const n = t.gentle ? 25 : 10;   // gentle route gives more practice
  if(fresh){ t.queue=genFracSet(t.kind, n); }
  else { t.queue=t.missed.slice(); }
  t.idx=0; t.correct=0; t.total=t.queue.length; t.missed=[]; t.locked=false;
  fracTestNext();
}
function fracTestNext(){
  const t=session.ftest;
  if(t.idx>=t.queue.length) return fracTestEnd();
  t.current=t.queue[t.idx]; t.locked=false;
  const q=t.current;
  app.innerHTML=`
    <div class="qtop"><button class="back" onclick="screenLevel()">✕</button>
      <span class="pill" style="color:var(--gold)">🍕 ${t.stage.def.name}</span>
      <span class="pill">${t.idx+1} / ${t.queue.length}</span></div>
    <div class="progress"><div style="width:${(t.idx/t.queue.length)*100}%"></div></div>
    <div class="center" style="margin:12px 0">${q.visual}</div>
    <p class="center" style="font-size:16px;margin:6px 0 14px">${q.prompt}</p>
    <div class="center">${fracInputHTML(q,'fracTestAns')}</div>
    <div class="feedback" id="fb"></div>`;
  setTimeout(()=>{ const n=$("fnum"); if(n) n.focus(); }, 50);
}
function fracTestAns(yn){
  const k=session.kid, t=session.ftest, q=t.current;
  if(t.locked) return;
  let gotN, gotD="";
  if(q.yesno||q.compare){ gotN=yn; }
  else {
    const oneField = q.single || q.accept==="decimal";
    gotN=$("fnum")?$("fnum").value:""; gotD=$("fden")?$("fden").value:"";
    if(gotN===""||(!oneField && gotD==="")) return toast(q.accept==="decimal"?"Type the decimal first":"Type the fraction first");
  }
  t.locked=true;
  const fb=$("fb");
  if(fracCorrect(q, gotN, gotD)){
    let bonus = (q.accept==="equivBonus" && fracIsSimplest(q,gotN,gotD)) ? 1 : 0;
    if(bonus){ fb.textContent="Correct & simplest! +1 🪙 bonus 🌟"; award(k,true,2); }
    else { fb.textContent="Correct! 🎉"; award(k,true); }
    fb.className="feedback good"; t.correct++;
  } else {
    fb.textContent="Answer: "+fracAnswerShown(q); fb.className="feedback bad"; SND.wrong(); t.missed.push(q);
  }
  t.idx++; save();
  setTimeout(()=>{ t.locked=false; fracTestNext(); }, 1300);
}
function fracTestEnd(){
  const k=session.kid, t=session.ftest, lv=t.lv, st=t.stage;
  const passed = t.missed.length===0;
  if(passed){
    if(t.gentle){ clearStageNow(k, lv, st, true); return; }
    // standard route: compulsory fraction speed drill next
    app.innerHTML=`
      <div class="card center" style="border-color:var(--green)">

        <div style="height:8px"></div>

      <button class="btn ghost" onclick="screenLevel()">Back to stages</button>

}

/* ---- Fraction speed drill: read + type in time, all 10, retry missed ---- */
function startFracSpeed(){
  const k=session.kid, lv=session.level, st=session.stage;
  const kind = st.def.mixed?"any":st.def.kind;
  session.fspeed={lv, stage:st, kind, speedSec:k.fracSpeedSec||8, queue:null, missed:[], correct:0};
  fracSpeedBuild(true);
}
function fracSpeedBuild(fresh){
  const fp=session.fspeed;
  if(fresh){ fp.queue=genFracSet(fp.kind,10); }
  else { fp.queue=fp.missed.slice(); }
  fp.idx=0; fp.correct=0; fp.total=fp.queue.length; fp.missed=[]; fp.locked=false;
  fracSpeedNext();
}
function fracSpeedNext(){
  const fp=session.fspeed;
  if(fp.timer){ clearInterval(fp.timer); fp.timer=null; }
  if(fp.idx>=fp.queue.length) return fracSpeedEnd();
  fp.current=fp.queue[fp.idx]; fp.locked=false;
  const q=fp.current;
  fp.choices=fracChoices(q);  // tappable answers — no typing in the timed round
  const choiceBtns=fp.choices.map(c=>
    `<button class="opt" style="min-width:96px" onclick="fracSpeedPick('${c.val}')">${c.label}</button>`
  ).join("");
  app.innerHTML=`
    <div class="qtop"><button class="back" onclick="exitFracSpeed()">✕</button>
      <span class="pill" style="color:var(--gold)">⚡ ${fp.stage.def.name}</span>
      <span class="pill timer" id="timer">⚡ ${fp.speedSec}s</span></div>
    <div class="progress"><div style="width:${(fp.idx/fp.queue.length)*100}%"></div></div>
    <div class="center" style="margin:10px 0">${q.visual}</div>
    <p class="center" style="font-size:15px;margin:4px 0 12px">${q.prompt}</p>
    <div class="opts" style="justify-content:center;flex-wrap:wrap;gap:10px">${choiceBtns}</div>
    <div class="feedback" id="fb"></div>`;
  fp.left=fp.speedSec;
  const myId=setInterval(()=>{
    if(fp.timer!==myId || fp.locked){ clearInterval(myId); return; }
    fp.left--;
    const el=$("timer"); if(el) el.textContent="⚡ "+Math.max(0,fp.left)+"s";
    if(fp.left<=0){ clearInterval(myId); if(fp.timer===myId) fp.timer=null; fracSpeedTimeout(); }
  },1000);
  fp.timer=myId;
}
function fracSpeedTimeout(){
  const fp=session.fspeed, q=fp.current;
  if(fp.locked) return; fp.locked=true;
  if(fp.timer){ clearInterval(fp.timer); fp.timer=null; }
  fp.missed.push(q);
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const fb=$("fb"); if(fb){ fb.textContent="Too slow! Answer: "+fracAnswerShown(q); fb.className="feedback bad"; } SND.wrong();
  fp.idx++;
  setTimeout(()=>fracSpeedNext(),1200);
}
function fracSpeedPick(val){
  const k=session.kid, fp=session.fspeed, q=fp.current;
  if(fp.locked) return;
  fp.locked=true;
  if(fp.timer){ clearInterval(fp.timer); fp.timer=null; }
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const fb=$("fb");
  if(fracChoiceCorrect(q, val)){
    const cn=coinsForSpeed(fp.speedSec);
    if(fb){ fb.textContent="⚡ In time! +"+cn+" 🪙"; fb.className="feedback good"; }
    fp.correct++; award(k,true,cn);
  } else {
    if(fb){ fb.textContent="Answer: "+fracAnswerShown(q); fb.className="feedback bad"; } SND.wrong();
    fp.missed.push(q);
  }
  fp.idx++; save();
  setTimeout(()=>fracSpeedNext(),1100);
}
function exitFracSpeed(){ const fp=session.fspeed; if(fp&&fp.timer){clearInterval(fp.timer);fp.timer=null;} screenLevel(); }
function fracSpeedEnd(){
  const k=session.kid, fp=session.fspeed, lv=fp.lv, st=fp.stage;
  if(fp.timer){ clearInterval(fp.timer); fp.timer=null; }
  if(fp.missed.length===0){ clearStageNow(k, lv, st, false); return; }
  save();
  app.innerHTML=`
    <div class="card center">
      <div style="font-size:46px">⏱️</div>
      <h2>${fp.correct}/10 in time</h2>
      <p class="muted">Almost! Retry the ${fp.missed.length} you missed to clear the stage.</p>
      <button class="btn gold" onclick="fracSpeedBuild(false)">⚡ Retry missed ones</button>
      <div style="height:8px"></div>
      <button class="btn ghost" onclick="screenLevel()">Back to stages</button>
    </div>`;
}

function startStageTest(gentle){
  const k=session.kid, lv=session.level, st=session.stage, s=st.def;
  session.stest={lv, stage:st, attempt:1, maxAttempts:3, queue:null, missed:[], correct:0, total:10, gentle:!!gentle};

function stageTestBuild(fresh){
  const k=session.kid, t=session.stest, s=t.stage.def, lv=t.lv;
  const n = t.gentle ? 25 : 10;   // gentle route gives more practice
  if(fresh){
    t.queue=genDistinctQs(k, lv.op, s.mixed?null:s.f, n);
  } else { t.queue=t.missed.slice(); }
  t.idx=0; t.correct=0; t.total=t.queue.length; t.missed=[]; t.locked=false;
  stageTestNext();
}
// generate n questions with no repeated fact within the set (different every attempt & device)
function genDistinctQs(k, op, fixed, n){
  const out=[], seen={};
  let tries=0;
  while(out.length<n && tries<n*30){
    session.q={op, fixed}; const q=genQ(k); tries++;
    if(!seen[q.key]){ seen[q.key]=1; out.push(q); }
  }
  // small fact spaces (e.g. a single table has 12 facts) — top up allowing repeats if needed
  while(out.length<n){ session.q={op, fixed}; out.push(genQ(k)); }

  // shuffle so order differs each time too
  for(let i=out.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [out[i],out[j]]=[out[j],out[i]]; }

function stageSpeedBuild(fresh){

function stageSpeedNext(){
  const sp=session.sspeed;

/* Shared: clear a stage, unlock next level if it's the last, render success.
   gentle=true means cleared via the test-only route. */
function clearStageNow(k, lv, st, gentle){
  const prev=clearedStage(k,lv.id);
  let levelDone=false;
  if(st.idx===prev+1){
    k.stageProgress[lv.id]=st.idx;
    if(!k.stageSpeed) k.stageSpeed={};
    if(!gentle) k.stageSpeed[lv.id+":"+st.idx]=true;
    const stages=stagesFor(lv.id);
    if(st.idx===stages.length-1){
      levelDone=true;
      const nxt=nextLevel(lv.id);
      if(nxt && !nxt.soon && !isUnlocked(k,nxt.id)) k.levelsUnlocked.push(nxt.id);

  k.history.push({date:Date.now(), mode:'stage', topic:lv.name+" "+st.def.name, score:10, total:10, timeSec:0});

function suggestNext(k){
  // point to the next uncleared stage in the highest unlocked level
  const unlocked=(k.levelsUnlocked||["tables"]).map(levelById).filter(l=>l&&!l.soon);
  const current=unlocked[unlocked.length-1];
  const stages=stagesFor(current.id);
  const nextIdx=clearedStage(k,current.id)+1;
  if(nextIdx<stages.length){
    const st=stages[nextIdx];
    if(session.warm && session.warm.correct<4){

  }
  // level complete
  return {label:`Open ${current.name}`, why:`Keep ${current.name} sharp, or explore the next level.`, action:`openLevel('${current.id}')`};
}

function mascotSay(text, mood){

/* ============================================================================== */

function fracBarSVG(num, den, w){
  w=w||300; const h=64, seg=w/den;
  let parts="";
  for(let i=0;i<den;i++){
    const filled=i<num;
    parts+=`<rect x="${i*seg}" y="0" width="${seg}" height="${h}" fill="${filled?'var(--cyan)':'var(--bg2)'}" stroke="var(--ink)" stroke-width="2"/>`;
  }
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:${w}px">${parts}</svg>`;
}
function fracPieSVG(num, den, size){
  size=size||180; const r=size/2-4, cx=size/2, cy=size/2;
  let slices="";
  for(let i=0;i<den;i++){
    const a0=(i/den)*2*Math.PI - Math.PI/2;
    const a1=((i+1)/den)*2*Math.PI - Math.PI/2;
    const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const large=(a1-a0)>Math.PI?1:0;
    const filled=i<num;
    slices+=`<path d="M${cx},${cy} L${x0},${y0} A${r},${r} 0 ${large} 1 ${x1},${y1} Z" fill="${filled?'var(--gold)':'var(--bg2)'}" stroke="var(--ink)" stroke-width="2"/>`;
  }
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${slices}</svg>`;
}
function randFrac(){
  const den=2+Math.floor(Math.random()*7);
  const num=1+Math.floor(Math.random()*(den-1));
  return {num,den};
}
// simplest form of a fraction
function simplest(num,den){ const g=gcd(num,den); return {num:num/g, den:den/g}; }
// a "friendly" base fraction from small denominators (for equivalent/simplify stages)
function friendlyFrac(maxDen){
  const dens=[2,3,4,5].concat(maxDen>=8?[6,8,10,12]:[]);
  let den=pick(dens);
  let num=1+Math.floor(Math.random()*(den-1));
  // reduce to simplest so we control the "base"
  const s=simplest(num,den); return {num:s.num, den:s.den};
}
// number line 0..1 with den ticks and an arrow at num/den
function numLineSVG(num,den){
  const w=320,h=70,pad=20,lineY=40,usable=w-2*pad;
  let ticks="";
  for(let i=0;i<=den;i++){
    const x=pad+(usable*i/den);
    ticks+=`<line x1="${x}" y1="${lineY-7}" x2="${x}" y2="${lineY+7}" stroke="var(--ink)" stroke-width="2"/>`;
    if(i===0) ticks+=`<text x="${x}" y="${lineY+26}" fill="var(--muted)" font-size="13" text-anchor="middle">0</text>`;
    if(i===den) ticks+=`<text x="${x}" y="${lineY+26}" fill="var(--muted)" font-size="13" text-anchor="middle">1</text>`;
  }
  const ax=pad+(usable*num/den);
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:${w}px">
    <line x1="${pad}" y1="${lineY}" x2="${w-pad}" y2="${lineY}" stroke="var(--ink)" stroke-width="2"/>
    ${ticks}
    <polygon points="${ax},${lineY-22} ${ax-7},${lineY-10} ${ax+7},${lineY-10}" fill="var(--gold)"/>
    <line x1="${ax}" y1="${lineY-10}" x2="${ax}" y2="${lineY}" stroke="var(--gold)" stroke-width="3"/>
  </svg>`;
}
// multiple whole circles to show an improper fraction (num/den, num can exceed den)
function wholesSVG(num,den){
  const wholes=Math.ceil(num/den);
  let out=`<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">`;
  let remaining=num;
  for(let wIdx=0; wIdx<wholes; wIdx++){
    const fillThis=Math.min(den, remaining); remaining-=fillThis;
    out+=`<div>${fracPieSVG(fillThis,den,90)}</div>`;
  }
  return out+`</div>`;
}
// two bars side by side showing the same shaded amount with different splits
function twoBarSVG(n1,d1,n2,d2){
  const w=300;
  return `<div style="display:flex;flex-direction:column;gap:10px;align-items:center">
    <div style="width:100%;text-align:center">${fracBarSVG(n1,d1,w)}<div class="muted" style="font-size:13px;margin-top:2px">${n1}/${d1}</div></div>
    <div style="width:100%;text-align:center">${fracBarSVG(n2,d2,w)}<div class="muted" style="font-size:13px;margin-top:2px">${n2}/${d2}</div></div>
  </div>`;
}
function genFrac(kind){
  if(kind==="any") kind=pick(["meet","parts","name","shade","build","compare","samewhole","numline","improper","mixed_num","frac_of","equiv_make","simplify","simplest"]);
  if(kind==="op_any") kind=pick(["add_same","sub_same","add_diff","sub_diff","mul","div"]);
  if(kind==="dp_any") kind=pick(["dec_read","dec_frac","dec_compare","pct_read","pct_frac","pct_of","convert","word"]);
  if(kind==="fm_any") kind=pick(["factors_of","is_factor","hcf","multiples_of","is_multiple","lcm"]);
  // ---- Understanding kinds ----
  if(kind==="name" || kind==="shade" || kind==="build" || kind==="parts"){
    const {num,den}=randFrac();
    const useShape = Math.random()<0.5;
    const visual = useShape ? fracPieSVG(num,den) : fracBarSVG(num,den);
    if(kind==="name" || kind==="shade"){
      return {kind, num, den, visual, prompt: kind==="name"?"What fraction is shown?":"What fraction is shaded?", answer:{num,den}, accept:"equiv"};
    }
    if(kind==="parts"){
      const askNum = Math.random()<0.5;
      return {kind, num, den, visual, prompt: askNum?"How many parts are shaded? (the top number)":"How many equal parts in total? (the bottom number)", single:true, answer: askNum?num:den };
    }
    return {kind, num, den, visual, prompt:`Type this fraction: ${num} out of ${den} equal parts`, answer:{num,den}, accept:"exact"};
  }
  // ---- Meet a fraction: numerator/denominator comprehension ----
  if(kind==="meet"){
    const {num,den}=randFrac();
    const useShape=Math.random()<0.5;
    const visual=useShape?fracPieSVG(num,den):fracBarSVG(num,den);
    const askNum=Math.random()<0.5;
    return {kind, num, den, visual,
      prompt: askNum
        ? `The TOP number is the <b>numerator</b> — the shaded parts. What is it here?`
        : `The BOTTOM number is the <b>denominator</b> — the total equal parts. What is it here?`,
      single:true, answer: askNum?num:den};
  }
  // ---- Compare two fractions (SAME whole — bars are equal size) ----
  if(kind==="compare"){
    let f1=randFrac(), f2=randFrac();
    while(f1.num*f2.den === f2.num*f1.den){ f2=randFrac(); }
    const firstBigger = f1.num*f2.den > f2.num*f1.den;
    return {kind, compare:true, f1, f2,
      visual:`<div style="display:flex;flex-direction:column;gap:8px;align-items:center">
        <div style="font-size:12px;color:var(--gold2);font-weight:700">Both bars are the SAME whole 👇</div>
        <div style="width:100%;text-align:center">${fracBarSVG(f1.num,f1.den,300)}<div class="muted" style="font-size:14px">A = ${f1.num}/${f1.den}</div></div>
        <div style="width:100%;text-align:center">${fracBarSVG(f2.num,f2.den,300)}<div class="muted" style="font-size:14px">B = ${f2.num}/${f2.den}</div></div></div>`,
      prompt:"Which is bigger? (same-size whole)", answer: firstBigger?"A":"B"};
  }
  // ---- Same or different whole: the BIG idea (½ of 50 vs ¼ of 300) ----
  if(kind==="samewhole"){
    // two fractions OF two different amounts; the smaller-looking fraction can win
    const opts=[
      {f1:{n:1,d:2}, w1:50,  f2:{n:1,d:4}, w2:300},   // 25 vs 75 → B
      {f1:{n:1,d:2}, w1:20,  f2:{n:1,d:3}, w2:60},    // 10 vs 20 → B
      {f1:{n:3,d:4}, w1:40,  f2:{n:1,d:2}, w2:100},   // 30 vs 50 → B
      {f1:{n:1,d:2}, w1:100, f2:{n:1,d:4}, w2:40},    // 50 vs 10 → A
      {f1:{n:2,d:3}, w1:30,  f2:{n:1,d:4}, w2:40},    // 20 vs 10 → A
      {f1:{n:1,d:4}, w1:80,  f2:{n:1,d:2}, w2:30}     // 20 vs 15 → A
    ];
    const o=pick(opts);
    const a1=o.f1.n/o.f1.d*o.w1, a2=o.f2.n/o.f2.d*o.w2;
    const aBigger=a1>a2;
    return {kind, compare:true,
      visual:`<div style="text-align:center">
        <div style="font-size:13px;color:var(--gold2);font-weight:700;margin-bottom:8px">⚠️ Different wholes! Work out the real amount.</div>
        <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
          <div style="background:rgba(255,255,255,.04);border:2px solid var(--line);border-radius:12px;padding:12px 16px">
            <div style="font-size:22px;font-weight:800">A</div>
            <div style="font-size:17px"><span class="fracBig"><span>${o.f1.n}</span><span class="b">${o.f1.d}</span></span> of ${o.w1}</div></div>
          <div style="background:rgba(255,255,255,.04);border:2px solid var(--line);border-radius:12px;padding:12px 16px">
            <div style="font-size:22px;font-weight:800">B</div>
            <div style="font-size:17px"><span class="fracBig"><span>${o.f2.n}</span><span class="b">${o.f2.d}</span></span> of ${o.w2}</div></div>
        </div></div>`,
      prompt:`Which is the bigger AMOUNT? Work out each one first!`,
      answer: aBigger?"A":"B", _a1:a1, _a2:a2};
  }
  // ---- Number line: place a fraction 0..1 (type the fraction at the mark) ----
  if(kind==="numline"){
    const den=pick([2,3,4,5,6,8]);
    const num=1+Math.floor(Math.random()*(den-1));
    return {kind, num, den, visual: numLineSVG(num,den),
      prompt:"What fraction is the arrow pointing to?", answer:{num,den}, accept:"equiv"};
  }
  // ---- Improper fraction from a picture (more than one whole) ----
  if(kind==="improper"){
    const den=pick([2,3,4]);
    const wholes=1+Math.floor(Math.random()*2);      // 1 or 2 full
    const extra=1+Math.floor(Math.random()*(den-1)); // partial
    const num=wholes*den+extra;
    return {kind, num, den, visual: wholesSVG(num,den),
      prompt:"Write the improper fraction shown (top can be bigger than bottom).",
      answer:{num,den}, accept:"exact"};
  }
  // ---- Mixed number -> improper, or naming whole+part ----
  if(kind==="mixed_num"){
    const den=pick([2,3,4,5]);
    const whole=1+Math.floor(Math.random()*3);
    const part=1+Math.floor(Math.random()*(den-1));
    const improperNum=whole*den+part;
    return {kind, num:improperNum, den, whole, part, visual: wholesSVG(improperNum,den),
      prompt:`This is ${whole} whole and ${part}/${den} more. Type it as an improper fraction.`,
      answer:{num:improperNum,den}, accept:"exact"};
  }
  // ---- Fraction of a number: 1/3 of 12 ----
  if(kind==="frac_of"){
    const den=pick([2,3,4,5]);
    const mult=2+Math.floor(Math.random()*5);       // whole divisible by den
    const whole=den*mult;
    const num=1+Math.floor(Math.random()*(den-1));
    const ans=(whole/den)*num;
    return {kind, single:true,
      visual:`<div style="font-size:30px;font-weight:800;text-align:center;color:var(--gold2)"><span class="fracBig"><span>${num}</span><span class="b">${den}</span></span> of ${whole}</div>`,
      prompt:`What is ${num}/${den} of ${whole}?`, answer:ans};
  }
  // ---- Equivalent: SEE (two bars, name the second) ----
  if(kind==="equiv_see"){
    const base=friendlyFrac(5);
    const mult=2+Math.floor(Math.random()*3); // 2..4
    const n2=base.num*mult, d2=base.den*mult;
    return {kind, num:n2, den:d2, baseNum:base.num, baseDen:base.den,
      visual: twoBarSVG(base.num,base.den, n2,d2),
      prompt:`Both bars show the same amount! The top is ${base.num}/${base.den}. Type the bottom one.`,
      answer:{num:n2,den:d2}, accept:"exact"};
  }
  // ---- Equivalent: MAKE (type any equivalent) ----
  if(kind==="equiv_make"){
    const base=friendlyFrac(8);
    return {kind, num:base.num, den:base.den, visual: fracBarSVG(base.num,base.den),
      prompt:`Type a fraction equal to ${base.num}/${base.den} (but with bigger numbers).`,
      answer:{num:base.num,den:base.den}, accept:"equivNotSame"};
  }
  // ---- Simplify: reduce to simplest ----
  if(kind==="simplify"){
    const base=friendlyFrac(8);
    const mult=2+Math.floor(Math.random()*4); // 2..5
    const n=base.num*mult, d=base.den*mult;
    return {kind, num:n, den:d, visual: fracBarSVG(n,d),
      prompt:`Simplify ${n}/${d} to its simplest form.`,
      answer:{num:base.num,den:base.den}, accept:"simplest"};
  }
  // ---- Simplest? yes/no ----
  if(kind==="simplest"){
    const alreadySimple = Math.random()<0.5;
    let n,d;
    if(alreadySimple){ const f=friendlyFrac(8); n=f.num; d=f.den; }
    else { const f=friendlyFrac(5); const m=2+Math.floor(Math.random()*3); n=f.num*m; d=f.den*m; }
    return {kind, num:n, den:d, visual: fracBarSVG(n,d), yesno:true,
      prompt:`Is ${n}/${d} already in its simplest form?`,
      answer: (gcd(n,d)===1)?"yes":"no"};
  }
  // ---- Operations ----
  if(kind==="add_same"||kind==="sub_same"||kind==="add_diff"||kind==="sub_diff"||kind==="mul"||kind==="div"){
    return genFracOp(kind);
  }
  // ---- Decimals & Percentages ----
  if(kind==="dec_read"||kind==="dec_frac"||kind==="dec_compare"||kind==="pct_read"||kind==="pct_frac"||kind==="pct_of"||kind==="convert"||kind==="word"){
    return genDecimal(kind);
  }
  if(kind==="factors_of"||kind==="is_factor"||kind==="hcf"||kind==="multiples_of"||kind==="is_multiple"||kind==="lcm"){
    return genFactorMultiple(kind);
  }
  // fallback
  const {num,den}=randFrac();
  return {kind:"name", num, den, visual:fracBarSVG(num,den), prompt:"What fraction is shaded?", answer:{num,den}, accept:"equiv"};
}

// ---- Factors & Multiples helpers ----
function factorsOf(n){ const f=[]; for(let i=1;i<=n;i++) if(n%i===0) f.push(i); return f; }
function hcfOf(a,b){ return gcd(a,b); }
function lcmOf(a,b){ return a*b/gcd(a,b); }
function genFactorMultiple(kind){
  if(kind==="factors_of"){
    // ask for ONE factor of n (other than 1 and n) — single number, accept any valid factor
    const n=pick([6,8,9,10,12,14,15,16,18,20,24]);
    const facs=factorsOf(n).filter(f=>f!==1 && f!==n);
    return {kind, single:true, factorList:facs, ofNum:n,
      visual:`<div style="font-size:30px;font-weight:800;text-align:center;color:var(--gold2)">${n}</div>`,
      prompt:`Type one factor of ${n} (not 1 or ${n}).`,
      answer:facs[0], acceptAnyOf:facs};
  }
  if(kind==="is_factor"){
    const n=pick([12,15,16,18,20,24,30]);
    const yes=Math.random()<0.5;
    let cand;
    const facs=factorsOf(n), nonFacs=[];
    for(let i=2;i<n;i++) if(n%i!==0) nonFacs.push(i);
    cand = yes ? pick(facs.filter(f=>f>1&&f<n)) : pick(nonFacs);
    return {kind, yesno:true,
      visual:`<div style="font-size:26px;font-weight:800;text-align:center;color:var(--gold2)">Is ${cand} a factor of ${n}?</div>`,
      prompt:`Does ${cand} divide ${n} evenly?`,
      answer: (n%cand===0)?"yes":"no"};
  }
  if(kind==="hcf"){
    const pairs=[[12,18],[8,12],[6,9],[10,15],[16,24],[20,30],[14,21],[9,12],[18,24],[15,20]];
    const [a,b]=pick(pairs);
    return {kind, single:true,
      visual:`<div style="font-size:26px;font-weight:800;text-align:center;color:var(--gold2)">HCF of ${a} and ${b}</div>`,
      prompt:`What is the highest common factor of ${a} and ${b}?`,
      answer:hcfOf(a,b), hcfA:a, hcfB:b};
  }
  if(kind==="multiples_of"){
    // ask for the Nth multiple (so there's one answer), e.g. "the 3rd multiple of 4"
    const base=pick([2,3,4,5,6,7,8]);
    const which=2+Math.floor(Math.random()*4); // 2nd..5th
    const ord=["","1st","2nd","3rd","4th","5th"][which];
    return {kind, single:true,
      visual:`<div style="font-size:26px;font-weight:800;text-align:center;color:var(--gold2)">${ord} multiple of ${base}</div>`,
      prompt:`What is the ${ord} multiple of ${base}? (${base}, ${base*2}, ${base*3} …)`,
      answer:base*which};
  }
  if(kind==="is_multiple"){
    const base=pick([3,4,5,6,7]);
    const yes=Math.random()<0.5;
    let cand = yes ? base*(2+Math.floor(Math.random()*6)) : base*(2+Math.floor(Math.random()*6))+pick([1,2]);
    return {kind, yesno:true,
      visual:`<div style="font-size:24px;font-weight:800;text-align:center;color:var(--gold2)">Is ${cand} a multiple of ${base}?</div>`,
      prompt:`Can you reach ${cand} by skip-counting in ${base}s?`,
      answer: (cand%base===0)?"yes":"no"};
  }
  // lcm
  const pairs=[[2,3],[3,4],[4,6],[2,5],[6,8],[3,5],[4,5],[6,9],[2,7],[3,6],[4,8],[5,10]];
  const [a,b]=pick(pairs);
  return {kind, single:true,
    visual:`<div style="font-size:26px;font-weight:800;text-align:center;color:var(--gold2)">LCM of ${a} and ${b}</div>`,
    prompt:`What is the lowest common multiple of ${a} and ${b}?`,
    answer:lcmOf(a,b), lcmA:a, lcmB:b};
}

// 10x10 grid with `filled` cells shaded (for percent/decimal visuals)
function hundredGridSVG(filled){
  const cell=18, gap=1, n=10, size=n*cell;
  let cells="";
  for(let r=0;r<n;r++) for(let c=0;c<n;c++){
    const idx=r*n+c, on=idx<filled;
    cells+=`<rect x="${c*cell}" y="${r*cell}" width="${cell-gap}" height="${cell-gap}" fill="${on?'var(--cyan)':'var(--bg2)'}" stroke="var(--ink)" stroke-width="0.5"/>`;
  }
  return `<svg viewBox="0 0 ${size} ${size}" width="180" height="180">${cells}</svg>`;
}
// tenths bar (10 segments) with `filled` shaded
function tenthsSVG(filled){ return fracBarSVG(filled,10,300); }

function genDecimal(kind){
  const decToFrac=(d)=>{ // 0.5 -> {1,2}
    let num=Math.round(d*100), den=100; const g=gcd(num,den); return {num:num/g,den:den/g};
  };
  if(kind==="dec_read"){
    const t=1+Math.floor(Math.random()*9); // tenths 0.1..0.9
    return {kind, single:false, isDecimal:true, decVal:t/10,
      visual: tenthsSVG(t),
      prompt:"What decimal is shaded? (e.g. 0.4)",
      answer:{dec:t/10}, accept:"decimal"};
  }
  if(kind==="dec_frac"){
    const opts=[[0.5,"1/2"],[0.25,"1/4"],[0.75,"3/4"],[0.2,"1/5"],[0.1,"1/10"],[0.4,"2/5"],[0.6,"3/5"],[0.8,"4/5"]];
    const [d,f]=pick(opts); const fr=decToFrac(d);
    return {kind, single:false,
      visual:`<div style="font-size:40px;font-weight:800;text-align:center;color:var(--gold2)">${d}</div>`,
      prompt:`Write ${d} as a fraction.`,
      answer:{num:fr.num,den:fr.den}, accept:"equiv"};
  }
  if(kind==="dec_compare"){
    let a=(1+Math.floor(Math.random()*98))/100;
    let b=(1+Math.floor(Math.random()*98))/100;
    while(Math.abs(a-b)<0.005){ b=(1+Math.floor(Math.random()*98))/100; }
    a=Math.round(a*100)/100; b=Math.round(b*100)/100;
    return {kind, compare:true, f1:{label:a}, f2:{label:b},
      visual:`<div style="font-size:34px;font-weight:800;text-align:center;color:var(--gold2)">A = ${a} &nbsp;&nbsp; B = ${b}</div>`,
      prompt:"Which is bigger?", answer: a>b?"A":"B", cmpA:a, cmpB:b};
  }
  if(kind==="pct_read"){
    const p=pick([10,20,25,30,40,50,60,70,75,80,90]);
    return {kind, single:true, isPercent:true,
      visual: hundredGridSVG(p),
      prompt:"What percent is shaded?",
      answer:p};
  }
  if(kind==="pct_frac"){
    const opts=[[50,"1/2"],[25,"1/4"],[75,"3/4"],[20,"1/5"],[10,"1/10"],[40,"2/5"]];
    const [p,f]=pick(opts); const num=p,den=100; const g=gcd(num,den);
    return {kind,
      visual:`<div style="font-size:40px;font-weight:800;text-align:center;color:var(--gold2)">${p}%</div>`,
      prompt:`Write ${p}% as a fraction.`,
      answer:{num:num/g,den:den/g}, accept:"equiv"};
  }
  if(kind==="pct_of"){
    const p=pick([10,20,25,50,75]);
    const base=pick([20,40,60,80,100,12,16,24]);
    const ans=Math.round(p/100*base);
    return {kind, single:true,
      visual:`<div style="font-size:30px;font-weight:800;text-align:center;color:var(--gold2)">${p}% of ${base}</div>`,
      prompt:`What is ${p}% of ${base}?`,
      answer:ans};
  }
  if(kind==="convert"){
    const opts=[[0.5,50,"1/2"],[0.25,25,"1/4"],[0.75,75,"3/4"],[0.2,20,"1/5"],[0.1,10,"1/10"]];
    const [d,p,f]=pick(opts);
    const ask=pick(["d2p","p2d","f2p"]);
    if(ask==="d2p") return {kind, single:true, visual:`<div style="font-size:34px;font-weight:800;text-align:center;color:var(--gold2)">${d}</div>`, prompt:`${d} = what percent?`, answer:p};
    if(ask==="p2d") return {kind, single:false, isDecimal:true, decVal:d, visual:`<div style="font-size:34px;font-weight:800;text-align:center;color:var(--gold2)">${p}%</div>`, prompt:`${p}% = what decimal?`, answer:{dec:d}, accept:"decimal"};
    const fr=f.split("/").map(Number);
    return {kind, single:true, visual:`<div style="font-size:34px;font-weight:800;text-align:center;color:var(--gold2)"><span class="fracBig"><span>${fr[0]}</span><span class="b">${fr[1]}</span></span></div>`, prompt:`${f} = what percent?`, answer:p};
  }
  // ---- Word problems ----
  return genWord();
}

function genWord(){
  const names=["Sam","Mia","Leo","Ava","Noah","Zara","Kai","Ivy"];
  const nm=pick(names);
  const templates=[
    ()=>{ const total=pick([8,10,12,6]); const ate=1+Math.floor(Math.random()*(total-1));
      const g=gcd(ate,total);
      return {prompt:`${nm} had a pizza cut into ${total} slices and ate ${ate}. What fraction did ${nm} eat?`,
        answer:{num:ate/g,den:total/g}, accept:"equiv", single:false}; },
    ()=>{ const p=pick([10,20,25,50]); const base=pick([20,40,60,80,100]); const ans=Math.round(p/100*base);
      return {prompt:`A toy costs $${base}. It's ${p}% off. How many dollars do you save?`, answer:ans, single:true}; },
    ()=>{ const total=pick([20,25,30,40,50]); const got=Math.round(pick([0.5,0.6,0.8,0.9])*total);
      const pct=Math.round(got/total*100);
      return {prompt:`${nm} scored ${got} out of ${total} on a test. What percent is that?`, answer:pct, single:true}; },
    ()=>{ const den=pick([2,3,4,5]); const whole=den*pick([2,3,4]); const num=1+Math.floor(Math.random()*(den-1));
      const ans=whole/den*num;
      return {prompt:`There are ${whole} students. ${num}/${den} of them like maths. How many is that?`, answer:ans, single:true}; }
  ];
  const t=pick(templates)();
  return Object.assign({kind:"word", visual:`<div style="font-size:30px;text-align:center">📖</div>`}, t);
}

function genFracOp(kind){
  const small=[2,3,4,5,6];
  function pf(maxNum,den){ return 1+Math.floor(Math.random()*(den-1)); }
  let a,b,resN,resD,sym,promptOp;
  if(kind==="add_same"||kind==="sub_same"){
    const den=pick([3,4,5,6,8]);
    let n1=1+Math.floor(Math.random()*(den-1));
    let n2=1+Math.floor(Math.random()*(den-1));
    if(kind==="sub_same"){ if(n1<n2){const t=n1;n1=n2;n2=t;} if(n1===n2){ n1=Math.min(den-1,n2+1);} }
    a={num:n1,den}; b={num:n2,den};
    sym = kind==="add_same"?"+":"−";
    resN = kind==="add_same"? n1+n2 : n1-n2; resD=den;
  } else if(kind==="add_diff"||kind==="sub_diff"){
    let d1=pick([2,3,4,5]), d2=pick([2,3,4,6]);
    while(d2===d1) d2=pick([2,3,4,6]);
    let n1=1+Math.floor(Math.random()*(d1-1));
    let n2=1+Math.floor(Math.random()*(d2-1));
    // common denominator
    const cd=d1*d2/gcd(d1,d2);
    let cn1=n1*(cd/d1), cn2=n2*(cd/d2);
    if(kind==="sub_diff" && cn1<cn2){ // ensure positive
      // swap whole fractions
      [n1,n2]=[n2,n1]; [d1,d2]=[d2,d1];
      cn1=n1*(cd/d1); cn2=n2*(cd/d2);
    }
    a={num:n1,den:d1}; b={num:n2,den:d2};
    sym = kind==="add_diff"?"+":"−";
    resN = kind==="add_diff"? cn1+cn2 : cn1-cn2; resD=cd;
  } else if(kind==="mul"){
    const d1=pick([2,3,4,5]), d2=pick([2,3,4,5]);
    const n1=1+Math.floor(Math.random()*(d1-1)), n2=1+Math.floor(Math.random()*(d2-1));
    a={num:n1,den:d1}; b={num:n2,den:d2};
    sym="×"; resN=n1*n2; resD=d1*d2;
  } else { // div
    const d1=pick([2,3,4,5]), d2=pick([2,3,4,5]);
    const n1=1+Math.floor(Math.random()*(d1-1)), n2=1+Math.floor(Math.random()*(d2-1));
    a={num:n1,den:d1}; b={num:n2,den:d2};
    sym="÷"; resN=n1*d2; resD=d1*n2; // multiply by reciprocal
  }
  return {kind, fracOp:true, a, b, sym,
    prompt:`${a.num}/${a.den} ${sym} ${b.num}/${b.den} = ?`,
    visual:`<div style="font-size:40px;font-weight:800;text-align:center;color:var(--gold2)">
      <span class="fracBig"><span>${a.num}</span><span class="b">${a.den}</span></span>
      &nbsp;${sym}&nbsp;
      <span class="fracBig"><span>${b.num}</span><span class="b">${b.den}</span></span></div>`,
    answer:{num:resN,den:resD}, accept:"equivBonus"};
}
// signature of a fraction question, to detect duplicates within one round
function fracSig(q){
  if(q.kind==="word") return "word:"+(q.prompt||"");
  if(q.kind==="samewhole") return "samewhole:"+(q.visual||"").slice(0,80);
  if(q.compare) return q.kind+":"+(q.cmpA!=null?q.cmpA+"vs"+q.cmpB : q.f1.num+"/"+q.f1.den+"vs"+q.f2.num+"/"+q.f2.den);
  if(q.fracOp) return q.kind+":"+q.a.num+"/"+q.a.den+q.sym+q.b.num+"/"+q.b.den;
  if(q.isDecimal) return q.kind+":"+(q.answer.dec!=null?q.answer.dec:q.decVal)+":"+(q.prompt||"");
  if(q.yesno) return q.kind+":"+q.num+"/"+q.den;
  if(q.single) return q.kind+":"+(q.answer)+":"+(q.prompt||"");
  return q.kind+":"+q.num+"/"+q.den;
}
// build n questions trying hard to avoid repeats; allows repeats only if the pool is exhausted
function genFracSet(kind, n){
  const out=[], seen={};
  let tries=0;
  while(out.length<n && tries<n*20){
    const q=genFrac(kind); const sig=fracSig(q); tries++;
    if(!seen[sig]){ seen[sig]=1; out.push(q); }
  }
  // if still short (tiny pool), top up allowing repeats
  while(out.length<n){ out.push(genFrac(kind)); }
  return out;
}
function fracCorrect(q, gotNum, gotDen){
  if(q.compare){ return (""+gotNum).toUpperCase()===q.answer; }
  if(q.yesno){ return (""+gotNum).toLowerCase()===q.answer; }
  if(q.acceptAnyOf){ return q.acceptAnyOf.indexOf(parseInt(gotNum))>=0; }
  if(q.accept==="decimal"){
    const v=parseFloat(gotNum);
    if(isNaN(v)) return false;
    return Math.abs(v - q.answer.dec) < 0.001;
  }
  if(q.single){ return parseInt(gotNum)===q.answer; }
  const a=parseInt(gotNum), b=parseInt(gotDen);
  if(isNaN(a)||isNaN(b)||b===0||a<0) return false;
  if(q.accept==="equiv"){ return a*q.answer.den === q.answer.num*b; }
  if(q.accept==="equivNotSame"){
    // must be equivalent AND not the identical fraction they were shown
    const equal = a*q.answer.den === q.answer.num*b;
    const same = (a===q.answer.num && b===q.answer.den);
    return equal && !same;
  }
  if(q.accept==="simplest"){
    // must equal the value AND be fully reduced
    const equal = a*q.answer.den === q.answer.num*b;
    const reduced = gcd(a,b)===1;
    return equal && reduced;
  }
  if(q.accept==="equivBonus"){
    // any equivalent correct value is accepted
    return a*q.answer.den === q.answer.num*b;
  }
  return a===q.answer.num && b===q.answer.den;
}
// did they give it in simplest form? (for the bonus)
function fracIsSimplest(q, gotNum, gotDen){
  const a=parseInt(gotNum), b=parseInt(gotDen);
  if(isNaN(a)||isNaN(b)||b===0) return false;
  return gcd(a,b)===1;
}

function fracAnswerShown(q){
