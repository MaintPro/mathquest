<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Math Quest</title>
<style>
  :root{
    --bg:#0e1b2c; --bg2:#12243b; --card:#16304d;
    --line:#244563; --ink:#eaf2ff; --muted:#8fa6c4;
    --gold:#ffc233; --gold2:#ffd970; --cyan:#36d1dc; --cyan2:#5be7f0;
    --green:#3ddc97; --red:#ff6b6b; --purple:#a78bfa;
    --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Trebuchet MS','Segoe UI',system-ui,-apple-system,sans-serif;
    background:radial-gradient(1200px 800px at 70% -10%, #1c3a5e 0%, var(--bg) 55%), var(--bg);
    color:var(--ink); overflow-x:hidden;
    -webkit-user-select:none; user-select:none;
  }
  .wrap{max-width:680px;margin:0 auto;padding:18px 18px 40px;min-height:100%;}
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:.3px;}
  .logo{font-size:34px;text-align:center;margin:8px 0 2px;
    background:linear-gradient(90deg,var(--gold),var(--cyan2));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .logo small{display:block;font-size:13px;letter-spacing:3px;color:var(--muted);
    -webkit-text-fill-color:var(--muted);font-weight:600;margin-top:2px;}
  .card{background:linear-gradient(180deg,var(--card),var(--bg2));
    border:1px solid var(--line);border-radius:var(--r);padding:18px;margin:14px 0;
    box-shadow:0 10px 30px rgba(0,0,0,.35);}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .btn{background:linear-gradient(180deg,var(--cyan2),var(--cyan));color:#05222a;
    font-weight:800;font-size:18px;padding:16px;border-radius:14px;width:100%;
    box-shadow:0 6px 0 #1c9aa6;transition:transform .05s, box-shadow .05s;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #1c9aa6;}
  .btn.gold{background:linear-gradient(180deg,var(--gold2),var(--gold));color:#3a2a00;box-shadow:0 6px 0 #c9920a;}
  .btn.gold:active{box-shadow:0 2px 0 #c9920a;}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);box-shadow:none;font-size:16px;}
  .btn.ghost:active{transform:translateY(2px);}
  .btn.sm{font-size:15px;padding:12px;}
  .muted{color:var(--muted);}
  .center{text-align:center;}
  .hide{display:none!important;}

  /* profile chips */
  .kid{position:relative;background:linear-gradient(180deg,var(--card),var(--bg2));
    border:2px solid var(--line);border-radius:20px;padding:20px 12px;text-align:center;
    transition:transform .08s, border-color .15s;}
  .kid:active{transform:scale(.97);}
  .kid .avatar{font-size:46px;line-height:1;}
  .kid .name{font-weight:800;margin-top:8px;font-size:18px;}
  .kid .stars{color:var(--gold);font-weight:700;font-size:13px;margin-top:4px;}
  .add{border-style:dashed;color:var(--muted);}

  /* pin pad */
  .pin-dots{display:flex;gap:14px;justify-content:center;margin:18px 0;}
  .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--cyan);}
  .dot.on{background:var(--cyan);}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:320px;margin:0 auto;}
  .key{background:var(--card);border:1px solid var(--line);border-radius:16px;
    font-size:26px;font-weight:800;color:var(--ink);padding:18px;}
  .key:active{background:var(--bg2);transform:scale(.95);}

  /* quiz */
  .qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .pill{background:var(--bg2);border:1px solid var(--line);border-radius:999px;
    padding:6px 14px;font-weight:700;font-size:14px;}
  .pill.timer{color:var(--gold);}
  .progress{height:10px;background:var(--bg2);border-radius:999px;overflow:hidden;margin:10px 0 4px;}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));width:0;transition:width .3s;}
  .question{font-size:54px;font-weight:800;text-align:center;margin:26px 0;letter-spacing:1px;}
  .answer{font-size:40px;text-align:center;font-weight:800;background:var(--bg2);
    border:2px solid var(--line);border-radius:16px;padding:14px;min-height:70px;
    color:var(--gold2);letter-spacing:3px;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
  .opt{background:var(--card);border:2px solid var(--line);border-radius:16px;
    font-size:26px;font-weight:800;color:var(--ink);padding:20px;}
  .opt:active{transform:scale(.96);}
  .opt.good{background:var(--green);color:#05291b;border-color:var(--green);}
  .opt.bad{background:var(--red);color:#3a0000;border-color:var(--red);}
  .feedback{text-align:center;font-size:22px;font-weight:800;min-height:30px;margin-top:14px;}
  .feedback.good{color:var(--green);}
  .feedback.bad{color:var(--red);}

  /* results */
  .big{font-size:60px;font-weight:800;text-align:center;
    background:linear-gradient(90deg,var(--gold),var(--cyan2));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .statline{display:flex;justify-content:space-between;padding:10px 4px;border-bottom:1px solid var(--line);}
  .statline:last-child{border-bottom:none;}

  /* range setup */
  label.lbl{display:block;font-weight:700;margin:14px 0 6px;}
  input[type=number]{width:90px;font-size:22px;font-weight:800;text-align:center;
    background:var(--bg2);border:2px solid var(--line);border-radius:12px;color:var(--ink);padding:10px;}
  .seg{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{background:var(--bg2);border:1px solid var(--line);border-radius:999px;
    padding:10px 16px;font-weight:700;font-size:15px;color:var(--ink);}
  .chip.on{background:var(--cyan);color:#05222a;border-color:var(--cyan);}

  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .back{background:var(--bg2);border:1px solid var(--line);border-radius:12px;
    color:var(--ink);font-size:20px;font-weight:800;padding:8px 14px;}
  .spacer{flex:1;}

  /* mode menu */
  .modecard{display:flex;align-items:center;gap:16px;text-align:left;background:linear-gradient(180deg,var(--card),var(--bg2));
    border:1px solid var(--line);border-radius:18px;padding:18px;width:100%;color:var(--ink);margin-bottom:12px;}
  .modecard:active{transform:scale(.98);}
  .modecard .ico{font-size:36px;}
  .modecard .t{font-weight:800;font-size:19px;}
  .modecard .d{color:var(--muted);font-size:13px;margin-top:2px;}
  .lock{margin-left:auto;color:var(--muted);font-size:13px;font-weight:700;}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);
    background:var(--purple);color:#fff;font-weight:800;padding:14px 22px;border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:50;opacity:0;transition:opacity .3s;}
  .toast.show{opacity:1;}

  .bubble{position:absolute;bottom:-70px;width:64px;height:64px;border-radius:50%;
    border:none;color:#05222a;font-size:22px;font-weight:800;
    box-shadow:0 4px 12px rgba(0,0,0,.4), inset 0 -6px 10px rgba(0,0,0,.15);
    animation:rise var(--dur,5s) linear forwards;}
  .bubble:active{transform:scale(.9);}
  @keyframes rise{ from{bottom:-70px;} to{bottom:110%;} }

  @media (prefers-reduced-motion: reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============ Math Quest — offline, device-only storage ============ */
const STORE_KEY = "mathquest_v1";
const AVATARS = ["🦊","🐯","🐼","🦁","🐸","🐙","🦄","🐧","🐲","🦉","🐝","🐶"];
// Sticker collection — each unlocks at a star milestone (every 25 stars)
const STICKERS = ["🐢","🦋","🐬","🦜","🦩","🐳","🦦","🦥","🐉","🦚","🦈","🐅","🦓","🦒","🐘","🦌","🦢","🐊","🦅","🦉"];
const STICKER_STEP = 25;
function stickerGoalReached(k){
  // how many stickers the kid has earned by total stars
  return Math.min(STICKERS.length, Math.floor(k.stars / STICKER_STEP));
}
function checkStickers(k){
  const earned = stickerGoalReached(k);
  k.stickers = k.stickers || [];
  const newOnes=[];
  while(k.stickers.length < earned){
    newOnes.push(STICKERS[k.stickers.length]);
    k.stickers.push(STICKERS[k.stickers.length]);
  }
  return newOnes; // array of newly unlocked stickers (usually 0 or 1)
}

/* ---- Coins & shop ---- */
function award(k, correct){
  // called per correct answer: 1 star + 1 coin
  if(correct){ k.stars++; k.coins=(k.coins||0)+1; }
}
const SHOP_AVATARS = ["🐵","🐰","🐺","🦝","🐹","🐱","🐮","🐷","🐗","🦔","🐭","🐔","🦇","🦅","🦈","🐊"];
const AVATAR_COST = 25;
function ownsAvatar(k,a){ return (k.avatarsOwned||[]).includes(a); }

/* Tiered premium stickers: Common -> Rare -> Epic -> Legendary */
const TIERS=[
  {tier:"Common",   cost:40,  color:"#7fa6c9"},
  {tier:"Rare",     cost:90,  color:"#4fc3f7"},
  {tier:"Epic",     cost:180, color:"#b388ff"},
  {tier:"Legendary",cost:350, color:"#ffca28"}
];
const SHOP_STICKERS=[
  // Common
  {id:"c1",emoji:"🌟",tier:0,name:"Gold Star"},{id:"c2",emoji:"🍀",tier:0,name:"Lucky Clover"},
  {id:"c3",emoji:"🎈",tier:0,name:"Balloon"},{id:"c4",emoji:"🌈",tier:0,name:"Rainbow"},
  // Rare
  {id:"r1",emoji:"🦄",tier:1,name:"Unicorn"},{id:"r2",emoji:"🚀",tier:1,name:"Rocket"},
  {id:"r3",emoji:"🐉",tier:1,name:"Dragon"},{id:"r4",emoji:"⚡",tier:1,name:"Lightning"},
  // Epic
  {id:"e1",emoji:"👑",tier:2,name:"Crown"},{id:"e2",emoji:"💎",tier:2,name:"Diamond"},
  {id:"e3",emoji:"🔥",tier:2,name:"Phoenix Fire"},{id:"e4",emoji:"🌌",tier:2,name:"Galaxy"},
  // Legendary
  {id:"L1",emoji:"🏆",tier:3,name:"Champion Trophy"},{id:"L2",emoji:"🦖",tier:3,name:"T‑Rex"},
  {id:"L3",emoji:"🛸",tier:3,name:"UFO"},{id:"L4",emoji:"🐲",tier:3,name:"Mega Dragon"}
];
function ownsSticker(k,id){ return (k.shopStickers||[]).includes(id); }

let _memFallback = false;
const PARENT_CODE = "246810";  // 6-digit code to enter the Parent area
let DB = load();
migrateDB();
function load(){
  try{
    const raw = window.localStorage.getItem(STORE_KEY);
    return raw ? (JSON.parse(raw) || {kids:[]}) : {kids:[]};
  }
  catch(e){ _memFallback = true; return {kids:[]}; }
}
/* Backfill fields added in later versions so older saved kids don't crash */
function migrateDB(){
  (DB.kids||[]).forEach(k=>{
    if(k.coins==null) k.coins=0;
    if(!k.avatarsOwned) k.avatarsOwned=[k.avatar];
    if(!k.levelsUnlocked) k.levelsUnlocked=["tables"];
    if(!k.stageProgress) k.stageProgress={};
    if(!k.lessonsSeen) k.lessonsSeen={};
    if(!k.belts) k.belts={};
    if(k.streak==null) k.streak=0;
    if(!k.stickers) k.stickers=[];
    if(!k.shopStickers) k.shopStickers=[];
    if(!k.range) k.range={min:1,max:12};
    if(k.speedSec==null) k.speedSec=5;
    if(!k.history) k.history=[];
    if(!k.facts) k.facts={};
    if(k.stars==null) k.stars=0;
  });
}
function save(){
  try{ window.localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }
  catch(e){
    // Safari Private Mode / blocked storage: keep working in memory this session
    if(!_memFallback){ _memFallback = true; }
  }
}

function newKid(name, avatar, pin){
  return {
    id: Date.now()+""+Math.floor(Math.random()*999),
    name, avatar, pin,
    range:{min:1,max:12},
    speedSec:5,
    stars:0,
    coins:0,                     // earned per correct answer; spent in shop
    stickers:[],
    shopStickers:[],             // premium stickers bought with coins
    avatarsOwned:[avatar],       // avatars unlocked (starts with their chosen one)
    levelsUnlocked:["tables"],
    stageProgress:{},            // levelId -> index of highest CLEARED stage (-1 = none)
    lessonsSeen:{},              // "levelId:stageIdx" -> true
    belts:{},                    // levelId -> belt index reached
    streak:0,                    // consecutive days
    lastWarmup:null,
    history:[],
    facts:{}
  };
}

/* ---- Belts ---- */
const BELTS = ["White","Yellow","Orange","Green","Blue","Purple","Brown","Black"];
const BELT_COLORS = ["#e8e8e8","#ffd93d","#ff9a3d","#4caf50","#2196f3","#9c27b0","#795548","#222"];

/* ---- Stages per level ----
   Each stage focuses on one factor/divisor; final stage is mixed mastery. */
function stagesFor(levelId){
  if(levelId==="tables"){
    return [
      {f:2,name:"The 2s"},{f:10,name:"The 10s"},{f:5,name:"The 5s"},{f:3,name:"The 3s"},
      {f:4,name:"The 4s"},{f:11,name:"The 11s"},{f:6,name:"The 6s"},{f:7,name:"The 7s"},
      {f:8,name:"The 8s"},{f:9,name:"The 9s"},{f:12,name:"The 12s"},{f:0,name:"Mixed Mastery",mixed:true}
    ];
  }
  if(levelId==="division"){
    return [
      {f:2,name:"÷2"},{f:10,name:"÷10"},{f:5,name:"÷5"},{f:3,name:"÷3"},
      {f:4,name:"÷4"},{f:11,name:"÷11"},{f:6,name:"÷6"},{f:7,name:"÷7"},
      {f:8,name:"÷8"},{f:9,name:"÷9"},{f:12,name:"÷12"},{f:0,name:"Mixed Mastery",mixed:true}
    ];
  }
  return [];
}
function clearedStage(k,levelId){ return (k.stageProgress&&k.stageProgress[levelId]!=null)?k.stageProgress[levelId]:-1; }
function beltFor(k,levelId){
  const stages=stagesFor(levelId); if(!stages.length) return 0;
  const cleared=clearedStage(k,levelId)+1; // count cleared
  // map cleared count (0..stages.length) onto belt index (0..7)
  return Math.min(BELTS.length-1, Math.round((cleared/stages.length)*(BELTS.length-1)));
}

/* ---- Learning path ---- */
const PATH = [
  {id:"tables",   name:"Times Tables", icon:"✖️", op:"x", desc:"Multiplication facts"},
  {id:"division", name:"Division",     icon:"➗", op:"÷", desc:"Sharing and grouping"},
  {id:"fractions",name:"Fractions",    icon:"🍕", op:"f", desc:"Parts of a whole", soon:true}
];
function levelById(id){ return PATH.find(l=>l.id===id); }
function nextLevel(id){ const i=PATH.findIndex(l=>l.id===id); return PATH[i+1]||null; }
function isUnlocked(k,id){ return (k.levelsUnlocked||["tables"]).includes(id); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }

let session = {}; // active kid + quiz state
const $ = id => document.getElementById(id);
const app = $("app");

function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1600);
}

/* ---------------- SCREENS ---------------- */

function screenProfiles(){
  const kids = DB.kids.map(k=>`
    <button class="kid" onclick="enterKid('${k.id}')">
      <div class="avatar">${k.avatar}</div>
      <div class="name">${esc(k.name)}</div>
      <div class="stars">⭐ ${k.stars}</div>
    </button>`).join("");
  const addBtn = DB.kids.length<6 ? `
    <button class="kid add" onclick="screenAddKid()">
      <div class="avatar">＋</div><div class="name">Add player</div>
      <div class="stars muted">up to 6</div>
    </button>`:"";
  app.innerHTML = `
    <div class="logo">Math Quest<small>LEVEL UP YOUR MATHS</small></div>
    <div class="card">
      <h2 class="center" style="margin-bottom:4px">Who's playing?</h2>
      <p class="center muted" style="margin:6px 0 16px;font-size:14px">Tap your name to start</p>
      <div class="grid3">${kids}${addBtn}</div>
    </div>
    ${DB.kids.length?`<button class="btn ghost sm" onclick="parentGate()">Parent area</button>`:""}
  `;
}

function screenAddKid(){
  const avs = AVATARS.map((a,i)=>`<button class="chip av ${i===0?'on':''}" data-a="${a}" onclick="pickAv(this)">${a}</button>`).join("");
  app.innerHTML = `
    <div class="topbar"><button class="back" onclick="screenProfiles()">‹</button><h2>New player</h2></div>
    <div class="card">
      <label class="lbl">Name</label>
      <input id="kname" style="width:100%;font-size:20px;font-weight:800;background:var(--bg2);border:2px solid var(--line);border-radius:12px;color:var(--ink);padding:12px" placeholder="First name" maxlength="14">
      <label class="lbl">Pick an animal</label>
      <div class="seg" id="avrow">${avs}</div>
      <label class="lbl">Choose a 4-digit PIN</label>
      <p class="muted" style="margin:0 0 8px;font-size:13px">They'll type this to log in. Pick something they remember.</p>
      <input id="kpin" type="tel" inputmode="numeric" maxlength="4" style="width:140px;font-size:26px;letter-spacing:8px;font-weight:800;text-align:center;background:var(--bg2);border:2px solid var(--line);border-radius:12px;color:var(--gold2);padding:12px">
      <div style="margin-top:18px"><button class="btn gold" onclick="saveNewKid()">Create player</button></div>
    </div>`;
  app._av = AVATARS[0];
}
function pickAv(el){
  document.querySelectorAll('.av').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); app._av = el.dataset.a;
}
function saveNewKid(){
  const name=$("kname").value.trim();
  const pin=$("kpin").value.trim();
  if(!name) return toast("Add a name");
  if(!/^\d{4}$/.test(pin)) return toast("PIN must be 4 digits");
  DB.kids.push(newKid(name, app._av, pin)); save();
  toast("Player created!"); screenProfiles();
}

/* ---- PIN login ---- */
function enterKid(id){
  const k = DB.kids.find(x=>x.id===id);
  session = {kid:k, entered:""};
  drawPin();
}
function drawPin(){
  const k=session.kid;
  const dots=[0,1,2,3].map(i=>`<div class="dot ${i<session.entered.length?'on':''}"></div>`).join("");
  const keys=[1,2,3,4,5,6,7,8,9,"x",0,"⌫"].map(n=>{
    if(n==="x") return `<div></div>`;
    return `<button class="key" onclick="pinPress('${n}')">${n}</button>`;
  }).join("");
  app.innerHTML = `
    <div class="topbar"><button class="back" onclick="screenProfiles()">‹</button><div class="spacer"></div></div>
    <div class="card center">
      <div style="font-size:52px">${k.avatar}</div>
      <h2>${esc(k.name)}</h2>
      <p class="muted" style="font-size:14px">Enter your PIN</p>
      <div class="pin-dots">${dots}</div>
      <div class="pad">${keys}</div>
    </div>`;
}
function pinPress(n){
  if(n==="⌫"){ session.entered=session.entered.slice(0,-1); return drawPin(); }
  if(session.entered.length>=4) return;
  session.entered+=n;
  if(session.entered.length===4){
    if(session.entered===session.kid.pin){ afterLogin(); }
    else { toast("Wrong PIN, try again"); session.entered=""; setTimeout(drawPin,150); }
    return;
  }
  drawPin();
}

/* ---- After login: daily warm-up gate, then path home ---- */
function afterLogin(){
  const k=session.kid;
  // warm-up due if they have history and haven't warmed up today
  const hasLearned = (k.history||[]).length>0;
  if(hasLearned && k.lastWarmup!==todayStr()){
    return screenWarmupIntro();
  }
  screenPath();
}

/* ---- Learning path home ---- */
function screenPath(){
  const k=session.kid;
  const cards = PATH.map(lv=>{
    const unlocked = isUnlocked(k,lv.id);
    const soon = lv.soon && !unlocked;
    const done = nextLevel(lv.id) && isUnlocked(k, (nextLevel(lv.id)||{}).id); // passed if next is open
    const status = soon ? `<span class="lock">🔒 soon</span>`
      : !unlocked ? `<span class="lock">🔒 locked</span>`
      : done ? `<span class="lock" style="color:var(--green)">✓ mastered</span>`
      : `<span class="lock" style="color:var(--cyan2)">open</span>`;
    const click = (unlocked && !lv.soon) ? `onclick="openLevel('${lv.id}')"` : `onclick="toast('${soon?'Coming soon!':'Master the level before this one first 🔒'}')"`;
    const beltBadge = (unlocked && !lv.soon && stagesFor(lv.id).length)
      ? `<div style="font-size:11px;color:var(--muted);margin-top:3px">${BELTS[beltFor(k,lv.id)]} belt · ${clearedStage(k,lv.id)+1}/${stagesFor(lv.id).length} stages</div>` : '';
    return `<button class="modecard" ${click} style="${unlocked&&!lv.soon?'':'opacity:.55'}">
      <span class="ico">${lv.icon}</span>
      <span><span class="t">${lv.name}</span><span class="d">${lv.desc}</span>${beltBadge}</span>
      ${status}</button>`;
  }).join("");
  const streakBadge = (k.streak||0)>1 ? `<span class="pill" style="color:#ff8a3d">🔥 ${k.streak}</span>` : '';
  app.innerHTML=`
    <div class="topbar"><button class="back" onclick="screenProfiles()">‹</button>

function openStage(i){

function stageLesson(){

    <div class="topbar"><button class="back" onclick="screenLevel()">‹</button><h2>${s.name}</h2></div>

function practiceStage(){
  const k=session.kid, lv=session.level, st=session.stage, s=st.def;
  session.q={mode:'practice', op:lv.op, correct:0, total:10, answered:0, start:Date.now(), beaten:0,
             fixed:s.mixed?null:s.f, fromStage:true};
  nextQuestion();
}
function startStageTest(){
  const k=session.kid, lv=session.level, st=session.stage, s=st.def;
  session.stest={lv, stage:st, attempt:1, maxAttempts:3, queue:null, missed:[], correct:0, total:10};
  stageTestBuild(true);
}
function stageTestBuild(fresh){
  const k=session.kid, t=session.stest, s=t.stage.def, lv=t.lv;
  if(fresh){
    t.queue=[];
    for(let i=0;i<10;i++){ session.q={op:lv.op, fixed:s.mixed?null:s.f}; t.queue.push(genQ(k)); }
    session.q=null;
  } else { t.queue=t.missed.slice(); }
  t.idx=0; t.correct=0; t.total=t.queue.length; t.missed=[]; t.locked=false;
  stageTestNext();
}
function stageTestNext(){
  const t=session.stest;
  if(t.idx>=t.queue.length) return stageTestEnd();
  t.current=t.queue[t.idx];
  const c=t.current;
  app.innerHTML=`
    <div class="qtop"><button class="back" onclick="screenLevel()">✕</button>
      <span class="pill" style="color:var(--gold)">📝 ${t.stage.def.name}</span>
      <span class="pill">${t.idx+1} / ${t.queue.length}</span></div>
    <div class="progress"><div style="width:${(t.idx/t.queue.length)*100}%"></div></div>
    <div class="question">${c.prompt}</div>
    <div class="opts">${c.choices.map(n=>`<button class="opt" onclick="stageTestAns(this,${n})">${n}</button>`).join("")}</div>
    <div class="feedback" id="fb"></div>`;
}
function stageTestAns(el,val){
  const k=session.kid, t=session.stest, c=t.current;
  if(t.locked) return; t.locked=true;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const fb=$("fb");
  const f=k.facts[c.key]||(k.facts[c.key]={seen:0,wrong:0}); f.seen++;
  if(val===c.ans){ el.classList.add("good"); fb.textContent="Correct!"; fb.className="feedback good"; t.correct++; award(k,true); }
  else { el.classList.add("bad"); f.wrong++; t.missed.push(c); document.querySelectorAll('.opt').forEach(b=>{if(+b.textContent===c.ans)b.classList.add("good");}); fb.textContent=`${c.prompt} = ${c.ans}`; fb.className="feedback bad"; }
  t.idx++; save();
  setTimeout(()=>{ t.locked=false; stageTestNext(); }, val===c.ans?550:1150);
}
function stageTestEnd(){
  const k=session.kid, t=session.stest, lv=t.lv, st=t.stage;
  const passed = t.missed.length===0;
  if(passed){
    // clear this stage if it's the next uncleared
    const prev=clearedStage(k,lv.id);
    let beltUp=false, levelDone=false, newBelt="";
    if(st.idx===prev+1){
      k.stageProgress[lv.id]=st.idx;
      const before=beltFor(k,lv.id);
      // recompute belt
      const after=beltFor(k,lv.id);
      // (belt already reflects new progress)
      newBelt=BELTS[beltFor(k,lv.id)];
      // if this was the final (mixed) stage, unlock next level
      const stages=stagesFor(lv.id);
      if(st.idx===stages.length-1){
        levelDone=true;
        const nxt=nextLevel(lv.id);
        if(nxt && !nxt.soon && !isUnlocked(k,nxt.id)) k.levelsUnlocked.push(nxt.id);
      }
    }
    k.history.push({date:Date.now(), mode:'stage', topic:lv.name+" "+st.def.name, score:10, total:10, timeSec:0});
    const unlocked=checkStickers(k); save();
    const stages=stagesFor(lv.id);
    const nextStage = stages[st.idx+1];
    app.innerHTML=`
      <div class="card center" style="border-color:var(--green)">
        <div style="font-size:48px">🎉</div>
        <h2>${st.def.name} cleared!</h2>
        <div class="big">10/10</div>
        <p class="muted">+10 ⭐ &nbsp; +10 🪙 &nbsp;·&nbsp; ${BELTS[beltFor(k,lv.id)]} Belt</p>
      </div>
      ${levelDone?`<div class="card center" style="border-color:var(--gold)"><div style="font-size:40px">${lv.icon}🏆</div><h3>${lv.name} fully mastered!</h3>${nextLevel(lv.id)&&!nextLevel(lv.id).soon?`<p class="muted">${nextLevel(lv.id).name} is now unlocked.</p>`:''}</div>`:''}
      <div class="card center">
        ${nextStage?`<button class="btn gold" onclick="openStage(${st.idx+1})">Next: ${nextStage.name} →</button><div style="height:8px"></div>`:''}
        <button class="btn ghost" onclick="screenLevel()">Back to stages</button>
      </div>`;
    return;
  }
  // not passed
  save();
  const canRetry=t.attempt<t.maxAttempts;
  app.innerHTML=`
    <div class="card center">
      <div style="font-size:46px">${canRetry?'🔁':'💪'}</div>
      <h2>${t.correct}/10</h2>
      <p class="muted">${canRetry?`Nearly! Let's redo just the ${t.missed.length} you missed.`:`Good try! Have another lesson and practise, then test again.`}</p>
      ${canRetry
        ? `<button class="btn gold" onclick="session.stest.attempt++;stageTestBuild(false)">Retry missed ones</button>`
        : `<button class="btn gold" onclick="stageLesson()">Review the lesson</button>`}
      <div style="height:8px"></div>
      <button class="btn ghost" onclick="screenLevel()">Back to stages</button>
    </div>`;
}

function startWarmup(){

  const seen=Object.keys(k.facts);

}
function buildWarmQs(k){
  // Generate 5 questions from unlocked levels, weighting tricky facts
  const ops = (k.levelsUnlocked||["tables"]).map(id=>levelById(id)).filter(l=>l&&!l.soon);
  const qs=[];
  for(let i=0;i<5;i++){
    const lv=ops[Math.floor(Math.random()*ops.length)]||PATH[0];
    session.q={op:lv.op}; // temp context for genQ
    qs.push({...genQ(k), levelName:lv.name});
  }
  session.q=null;
  return qs;
}
function warmNext(){
  const w=session.warm;
  if(w.idx>=w.total) return warmEnd();
  w.current=w.qs[w.idx];
  const c=w.current;
  app.innerHTML=`
    <div class="qtop"><button class="back" onclick="screenPath()">✕</button>
      <span class="pill">☀️ Warm-up</span><span class="pill">${w.idx+1} / ${w.total}</span></div>

}
function warmAns(el,val){
  const k=session.kid, w=session.warm, c=w.current;
  if(w.locked) return; w.locked=true;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const fb=$("fb");
  if(val===c.ans){ el.classList.add("good"); fb.textContent="Yes!"; fb.className="feedback good"; w.correct++; award(k,true); }
  else { el.classList.add("bad"); document.querySelectorAll('.opt').forEach(b=>{if(+b.textContent===c.ans)b.classList.add("good");}); fb.textContent=`${c.prompt} = ${c.ans}`; fb.className="feedback bad"; }
  w.idx++;
  setTimeout(()=>{ w.locked=false; warmNext(); }, val===c.ans?600:1200);
}
function warmEnd(){
  const k=session.kid, w=session.warm;
  // update streak: consecutive days. yesterday -> +1, gap -> reset to 1
  const prev=k.lastWarmup;
  const y=new Date(); y.setDate(y.getDate()-1);
  const yStr=y.getFullYear()+"-"+(y.getMonth()+1)+"-"+y.getDate();
  if(prev===yStr) k.streak=(k.streak||0)+1;
  else if(prev!==todayStr()) k.streak=1;
  k.lastWarmup=todayStr();
  checkStickers(k); save();
  // auto-suggest the next best thing
  const suggestion = suggestNext(k);
  app.innerHTML=`
    <div class="card center">
      <div style="font-size:48px">${w.correct>=4?'🌟':'💪'}</div>
      <h2>Warm-up done!</h2>
      <div class="big">${w.correct}/${w.total}</div>
      <p class="muted">🔥 ${k.streak||1}-day streak &nbsp;·&nbsp; ${w.correct>=4?'Sharp as ever!':'Good shake-out.'}</p>
    </div>
    <div class="card">
      <h3>Suggested for today</h3>
      <p class="muted" style="font-size:14px;margin:6px 0 12px">${suggestion.why}</p>
      <button class="btn gold" onclick="${suggestion.action}">${suggestion.label}</button>
    </div>
    <button class="btn ghost" onclick="screenPath()">Choose myself</button>`;
}
function suggestNext(k){
  // point to the next uncleared stage in the highest unlocked level
  const unlocked=(k.levelsUnlocked||["tables"]).map(levelById).filter(l=>l&&!l.soon);
  const current=unlocked[unlocked.length-1];
  const stages=stagesFor(current.id);
  const nextIdx=clearedStage(k,current.id)+1;
  if(nextIdx<stages.length){
    const st=stages[nextIdx];
    if(session.warm && session.warm.correct<4){
      return {label:`Practise ${current.name}`, why:`Warm up with a little ${current.name.toLowerCase()} practice first.`, action:`openLevel('${current.id}');setTimeout(()=>{session.stage={lv:session.level,idx:${nextIdx},def:stagesFor('${current.id}')[${nextIdx}]};practiceStage();},60)`};
    }
    return {label:`Continue: ${st.name}`, why:`You're flying! Your next stage is ${st.name} — learn it and clear the test.`, action:`openLevel('${current.id}');setTimeout(()=>openStage(${nextIdx}),60)`};
  }
  // level complete
  return {label:`Open ${current.name}`, why:`Keep ${current.name} sharp, or explore the next level.`, action:`openLevel('${current.id}')`};
}

function setSpeed(s){ session.kid.speedSec=s; save(); screenRange(); toast("Goal: "+s+"s"); }
function saveRange(){
  let a=parseInt($("rmin").value)||1, b=parseInt($("rmax").value)||12;
  a=Math.max(1,Math.min(20,a)); b=Math.max(1,Math.min(20,b));
  if(a>b)[a,b]=[b,a];
  session.kid.range={min:a,max:b}; save(); toast("Saved"); screenModes();
}

/* ---- QUIZ ENGINE ---- */
function genQ(k){
  const op = (session.q && session.q.op) || "x";
  const {min,max}=k.range;
  const rnd=()=>min+Math.floor(Math.random()*(max-min+1));

  if(op==="÷"){
    // build a clean division: divisor b, quotient q -> dividend a = b*q
    let b, quo;
    if(session.q && session.q.fixed){ b=session.q.fixed; quo=1+Math.floor(Math.random()*12); }
    else { b=Math.max(2,rnd()); quo=1+Math.floor(Math.random()*12); }
    const a=b*quo;            // dividend
    const ans=quo;
    const opts=new Set([ans]);
    while(opts.size<4){
      let d=ans + (Math.floor(Math.random()*7)-3);
      if(d<1) d=ans+Math.floor(Math.random()*4)+1;
      if(d!==ans) opts.add(d);
    }
    const choices=[...opts].slice(0,4).sort(()=>Math.random()-.5);
    return {a,b,ans,choices,op:"÷",prompt:a+" ÷ "+b,key:a+"÷"+b};
  }

  // multiplication (default)
  let a=rnd(), b=rnd();
  if(session.q && session.q.fixed){ a=session.q.fixed; b=1+Math.floor(Math.random()*12); }
  const tricky=Object.entries(k.facts).filter(([key,f])=>f.wrong>0 && key.includes("x"));
  if(!(session.q&&session.q.fixed) && tricky.length && Math.random()<0.4){
    const pick=tricky[Math.floor(Math.random()*tricky.length)][0].split("x");
    a=+pick[0]; b=+pick[1];
  }
  const ans=a*b;
  const opts=new Set([ans]);
  while(opts.size<4){
    let d=ans + (Math.floor(Math.random()*9)-4);
    if(d<0) d=ans+Math.floor(Math.random()*5)+1;
    if(d!==ans) opts.add(d);
    if(opts.size<4 && Math.random()<.5) opts.add(a*(b+ (Math.random()<.5?1:-1)));
  }
  const choices=[...opts].slice(0,4).sort(()=>Math.random()-.5);
  return {a,b,ans,choices,op:"x",prompt:a+" × "+b,key:a+"x"+b};
}

function startQuiz(mode){
  const k=session.kid;
  const op = session.level ? session.level.op : "x";
  session.q={mode, op, idx:0, correct:0, total: mode==='timed'?999:10,
             answered:0, log:[], start:Date.now(), timeLeft:60,
             speedSec:k.speedSec||5, beaten:0};
  if(mode==='timed'){
    session.q.timer=setInterval(()=>{
      session.q.timeLeft--;
      const el=$("timer"); if(el) el.textContent="⏱️ "+session.q.timeLeft+"s";
      if(session.q.timeLeft<=0) endQuiz();
    },1000);
  }
  nextQuestion();
}
function nextQuestion(){
  const k=session.kid, q=session.q;
  // always clear any lingering per-question timer before drawing the next one
  if(q.perTimer){ clearInterval(q.perTimer); q.perTimer=null; }
  if((q.mode==='practice'||q.mode==='speed') && q.answered>=10) return endQuiz();
  q.current=genQ(k);
  q.qStart=Date.now();
  q.locked=false;
  drawQuiz();
  if(q.mode==='speed'){
    q.perLeft=q.speedSec;
    const myId=setInterval(()=>{
      // if this isn't the active timer any more, stop it
      if(q.perTimer!==myId || q.locked){ clearInterval(myId); return; }
      q.perLeft--;
      const el=$("timer"); if(el) el.textContent="⚡ "+Math.max(0,q.perLeft)+"s";
      if(q.perLeft<=0){ clearInterval(myId); if(q.perTimer===myId) q.perTimer=null; timeOut(); }
    },1000);
    q.perTimer=myId;
  }
}
function timeOut(){
  const q=session.q, c=q.current;
  if(q.locked) return; q.locked=true;
  if(q.perTimer){ clearInterval(q.perTimer); q.perTimer=null; }
  document.querySelectorAll('.opt').forEach(b=>{ b.disabled=true; if(+b.textContent===c.ans) b.classList.add("good"); });
  const k=session.kid;
  const f=k.facts[c.key]||(k.facts[c.key]={seen:0,wrong:0}); f.seen++; f.wrong++;
  const fb=$("fb"); fb.textContent="Too slow! "+c.prompt+" = "+c.ans; fb.className="feedback bad";
  q.answered++; save();
  setTimeout(()=>{ nextQuestion(); },1300);
}
function drawQuiz(){
  const k=session.kid, q=session.q, c=q.current;
  const prog = (q.mode==='timed') ? Math.min(100,(q.answered/10)*100) : (q.answered/10)*100;
  let counter;
  if(q.mode==='timed') counter=`<span class="pill timer" id="timer">⏱️ ${q.timeLeft}s</span>`;
  else if(q.mode==='speed') counter=`<span class="pill timer" id="timer">⚡ ${q.speedSec}s</span>`;
  else counter=`<span class="pill">${q.answered+1} / 10</span>`;
  app.innerHTML=`
    <div class="qtop">
      <button class="back" onclick="quitQuiz()">✕</button>
      <span class="pill">✅ ${q.correct}</span>
      ${counter}
    </div>
    <div class="progress"><div style="width:${prog}%"></div></div>
    <div class="question">${c.prompt}</div>
    <div class="opts">
      ${c.choices.map(n=>`<button class="opt" onclick="answer(this,${n})">${n}</button>`).join("")}
    </div>
    <div class="feedback" id="fb"></div>`;
}
function answer(el, val){
  const k=session.kid, q=session.q, c=q.current;
  if(q.locked) return; q.locked=true;
  if(q.perTimer){ clearInterval(q.perTimer); q.perTimer=null; }
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const fb=$("fb");
  const f = k.facts[c.key] || (k.facts[c.key]={seen:0,wrong:0});
  f.seen++;
  const elapsed=(Date.now()-q.qStart)/1000;
  if(val===c.ans){
    el.classList.add("good");
    if(q.mode==='speed' && elapsed<=q.speedSec){ q.beaten++; fb.textContent="⚡ "+elapsed.toFixed(1)+"s — beat it!"; }
    else fb.textContent=pick(["Nice!","Correct!","Boom!","Spot on!","Yes!"]);
    fb.className="feedback good";
    q.correct++; award(k,true);
  } else {
    el.classList.add("bad"); f.wrong++;
    document.querySelectorAll('.opt').forEach(b=>{ if(+b.textContent===c.ans) b.classList.add("good"); });
    fb.textContent=`${c.prompt} = ${c.ans}`; fb.className="feedback bad";
  }
  q.answered++;
  save();
  setTimeout(()=>{ q.locked=false; nextQuestion(); }, val===c.ans?650:1300);
}
function quitQuiz(){ const q=session.q; if(q){ if(q.timer)clearInterval(q.timer); if(q.perTimer)clearInterval(q.perTimer);} screenModes(); }

/* ---- Rich lesson content for each times table ----
   Each: tricks[] (one or more), why (why it works), example (worked) */
const MULT_LESSONS={
  1:{tricks:["Anything × 1 stays exactly the same."],
     why:"Multiplying by 1 means you have just one group of the number — so nothing changes.",
     example:"1 × 8 = 8, because one group of 8 is just 8."},
  2:{tricks:["Doubling — add the number to itself.","All answers are even (end in 0,2,4,6,8)."],
     why:"× 2 means two groups, which is the same as adding the number to itself.",
     example:"2 × 7 = 7 + 7 = 14."},
  3:{tricks:["Double the number, then add one more of it.","Trick to check: add the digits of the answer — they add to a multiple of 3."],
     why:"× 3 is three groups: double it (×2) then add one more group.",
     example:"3 × 6 → double 6 is 12, plus 6 = 18."},
  4:{tricks:["Double, then double again.","Answers are always even."],
     why:"× 4 is the same as ×2 twice, because 4 = 2 × 2.",
     example:"4 × 6 → double 6 is 12, double again is 24."},
  5:{tricks:["Every answer ends in 5 or 0.","Quick way: × 10 then halve it.","Count like a clock: 5, 10, 15, 20…"],
     why:"5 is half of 10, so the fives land exactly halfway between the tens.",
     example:"5 × 8 → 10 × 8 = 80, half of 80 = 40."},
  6:{tricks:["× 6 of an even number ends in that same number's pattern: 6×2=12, 6×4=24, 6×6=36, 6×8=48.","Or do × 5 then add one more group."],
     why:"× 6 is ×5 plus one more group, because 6 = 5 + 1.",
     example:"6 × 7 → 5 × 7 = 35, plus 7 = 42."},
  7:{tricks:["The tricky one — lean on tables you know: × 5 then add × 2.","7 × 8 = 56 is worth memorising (5,6,7,8!)."],
     why:"7 = 5 + 2, so split it into a ×5 and a ×2 and add them.",
     example:"7 × 6 → 5 × 6 = 30, plus 2 × 6 = 12, total 42."},
  8:{tricks:["Double three times.","Or do × 10 then subtract × 2."],
     why:"8 = 2 × 2 × 2, so doubling three times gets you there. Also 8 = 10 − 2.",
     example:"8 × 3 → 3 → 6 → 12 → 24. Or 10×3=30 minus 2×3=6 → 24."},
  9:{tricks:["Finger trick: hold up 10 fingers, fold the one you're multiplying by. Fingers before = tens, after = ones.","The digits of every answer add up to 9.","Fastest way: × 10 then subtract one group."],
     why:"9 is one less than 10, so 9×n is just 10×n minus one n.",
     example:"9 × 4 → 10 × 4 = 40, minus 4 = 36. (And 3 + 6 = 9!)"},
  10:{tricks:["Just add a zero to the number."],
     why:"Our number system is base‑10, so ×10 shifts every digit one place up.",
     example:"10 × 7 = 70."},
  11:{tricks:["For 11 × a single digit, write the digit twice.","For bigger numbers, add the two digits and put the sum in the middle."],
     why:"11 = 10 + 1, so 11×n is 10×n plus one more n, which lines the digits up neatly.",
     example:"11 × 3 = 33. 11 × 7 = 77."},
  12:{tricks:["Do × 10 then add × 2.","Or × 6 then double."],
     why:"12 = 10 + 2, so split into a ×10 and a ×2 and add.",
     example:"12 × 4 → 10 × 4 = 40, plus 2 × 4 = 8, total 48."}
};
function renderMultLesson(f){
  const L=MULT_LESSONS[f]; if(!L) return `<p>Count up in ${f}s.</p>`;
  const tricks=L.tricks.map(t=>`<li style="margin:6px 0">${t}</li>`).join("");
  return `<p style="font-size:14px;color:var(--gold2);font-weight:700;margin:0 0 4px">✨ ${L.tricks.length>1?'Tricks':'Trick'}</p>
    <ul style="font-size:15px;line-height:1.5;margin:0 0 12px;padding-left:20px">${tricks}</ul>
    <p style="font-size:14px;color:var(--cyan2);font-weight:700;margin:0 0 4px">🤔 Why it works</p>
    <p style="font-size:15px;line-height:1.55;margin:0 0 12px">${L.why}</p>
    <p style="font-size:14px;color:var(--green);font-weight:700;margin:0 0 4px">📝 Example</p>
    <p style="font-size:15px;line-height:1.55;margin:0">${L.example}</p>`;
}
function renderDivLesson(f){
  return `<p style="font-size:14px;color:var(--gold2);font-weight:700;margin:0 0 4px">✨ Trick</p>
    <ul style="font-size:15px;line-height:1.5;margin:0 0 12px;padding-left:20px">
      <li style="margin:6px 0">Flip it into a times-table question: ${f*6} ÷ ${f} asks "${f} × what = ${f*6}?"</li>
      <li style="margin:6px 0">If you know your ${f}× table, you already know every ÷${f} fact.</li>
    </ul>
    <p style="font-size:14px;color:var(--cyan2);font-weight:700;margin:0 0 4px">🤔 Why it works</p>
    <p style="font-size:15px;line-height:1.55;margin:0 0 12px">Division undoes multiplication. Sharing ${f*6} into groups of ${f} is asking how many ${f}s fit inside ${f*6}.</p>
    <p style="font-size:14px;color:var(--green);font-weight:700;margin:0 0 4px">📝 Example</p>
    <p style="font-size:15px;line-height:1.55;margin:0">${f*7} ÷ ${f}: think "${f} × 7 = ${f*7}", so the answer is 7.</p>`;
}

function trickFor(t){
  const m={
    2:"Doubling! Just add the number to itself. 2×7 = 7+7 = 14.",
    4:"Double, then double again. 4×6 → double 6 is 12, double again is 24.",
    5:"Every answer ends in 5 or 0. They go 5,10,15,20… like the clock!",
    8:"Double three times. 8×3 → 6 → 12 → 24.",
    9:"Finger trick: hold up 10 fingers. For 9×4, fold your 4th finger. Fingers before it = 3 (tens), fingers after = 6 (ones) → 36. Also the digits always add to 9!",
    10:"Easiest of all — just add a zero. 10×7 = 70.",
    11:"For 11× single digits, just double the digit: 11×3 = 33, 11×7 = 77.",
    1:"Anything times 1 stays the same. 1×8 = 8."
  };
  return m[t]||null;
}

/* ---- Explore: Division (sharing & grouping) ---- */
function screenExploreDiv(divisor){
  const k=session.kid;
  if(!divisor){
    const chips=[];
    for(let t=2;t<=12;t++) chips.push(`<button class="opt" style="padding:14px;font-size:20px" onclick="screenExploreDiv(${t})">÷${t}</button>`);
    app.innerHTML=`
      <div class="topbar"><button class="back" onclick="screenPath()">‹</button><h2>Explore division</h2></div>
      <div class="card">
        <h3>What is division?</h3>
        <p style="font-size:15px;line-height:1.55;margin:8px 0 0">Division is <b>sharing equally</b> or <b>making equal groups</b>. 12 ÷ 3 asks: if I share 12 things into 3 equal groups, how many in each? (Answer: 4.)</p>
        <p style="font-size:15px;line-height:1.55;margin:10px 0 0">✨ <b>Big idea:</b> division is the opposite of times tables. If 3 × 4 = 12, then 12 ÷ 3 = 4 and 12 ÷ 4 = 3. Knowing your tables means you already know division!</p>
      </div>
      <div class="card">
        <p class="muted center" style="margin-top:0">Pick a number to divide by.</p>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">${chips}</div>
      </div>`;
    return;
  }
  const d=divisor;
  // sharing facts: d*q ÷ d = q, tap to reveal
  let facts='';
  for(let q=1;q<=12;q++){
    const dividend=d*q;
    facts+=`<button class="statline" style="width:100%;background:none;border:none;border-bottom:1px solid var(--line);color:var(--ink)" onclick="this.querySelector('.rv').textContent='= ${q}';this.querySelector('.rv').style.color='var(--gold2)'">
      <span>${dividend} ÷ ${d}</span><b class="rv" style="color:var(--muted)">tap</b></button>`;
  }
  // visual: 12 ÷ 3 style dots into groups (use d groups of 4 as an example)
  const exampleQ=4, dots=[];
  for(let g=0;g<d;g++){
    let group='';
    for(let i=0;i<exampleQ;i++) group+='🔵';
    dots.push(`<div style="background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center;font-size:16px">${group}</div>`);
  }
  app.innerHTML=`
    <div class="topbar"><button class="back" onclick="screenExploreDiv()">‹</button><h2>Dividing by ${d}</h2></div>
    <div class="card">
      <h3>See it: ${d*exampleQ} ÷ ${d}</h3>
      <p class="muted" style="font-size:14px;margin:6px 0 10px">Share ${d*exampleQ} into ${d} equal groups — count one group.</p>
      <div style="display:grid;grid-template-columns:repeat(${Math.min(d,4)},1fr);gap:8px">${dots.join("")}</div>
      <p style="font-size:15px;margin:12px 0 0">${d} groups, <b>${exampleQ} in each</b> → ${d*exampleQ} ÷ ${d} = ${exampleQ}.</p>
    </div>
    <div class="card">
      <h3>✨ Trick: flip the times table</h3>
      <p style="font-size:15px;line-height:1.55;margin:8px 0 0">To work out ${d*7} ÷ ${d}, ask "${d} times what makes ${d*7}?" → ${d} × 7 = ${d*7}, so the answer is 7.</p>
    </div>
    <div class="card">
      <h3>Tap to reveal</h3>
      <div style="margin-top:6px">${facts}</div>
    </div>
    <button class="btn gold" onclick="(session.q={mode:'practice',op:'÷',correct:0,total:10,answered:0,start:Date.now(),beaten:0,fixed:${d}},nextQuestion())">Quiz me on ÷${d}</button>`;
}

/* ---- Pop the answer (arcade) ---- */
function startPop(){
  const k=session.kid;
  const op = session.level ? session.level.op : "x";
  session.q={op}; // op context only (genQ reads session.q.op)
  session.pop={score:0, answered:0, total:10, start:Date.now()};
  popNext();
}
function exitPop(){ const p=session.pop; if(p){ p.done=true; if(p.timeout) clearTimeout(p.timeout); } screenModes(); }
function popNext(){
  const k=session.kid, p=session.pop;
  if(p.timeout) clearTimeout(p.timeout);
  if(p.answered>=p.total) return popEnd();
  const c=genQ(k); p.current=c;
  // build bubbles from the 4 choices
  const bubbles=c.choices.map((n,i)=>{
    const left=8+i*23+(Math.random()*6-3);
    const dur=(4.2+Math.random()*1.6).toFixed(2);
    const delay=(i*0.5).toFixed(2);
    const col=['#36d1dc','#a78bfa','#3ddc97','#ffc233'][i];
    return `<button class="bubble" style="left:${left}%;--dur:${dur}s;animation-delay:${delay}s;background:${col}"
      onclick="popHit(${n})">${n}</button>`;
  }).join("");
  app.innerHTML=`
    <div class="qtop">
      <button class="back" onclick="exitPop()">✕</button>
      <span class="pill">✅ ${p.score}</span>
      <span class="pill">${p.answered+1} / ${p.total}</span>
    </div>
    <div class="question" style="margin:14px 0">${c.prompt}</div>
    <div id="poparea" style="position:relative;height:46vh;overflow:hidden;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#0b1a2c,#10243c)">
      ${bubbles}
    </div>
    <div class="feedback" id="fb"></div>`;
  // if all bubbles float off screen, count as miss
  p.timeout=setTimeout(()=>popHit(null,true), 6200);
}
function popHit(val, missed){
  const p=session.pop, k=session.kid;
  const fb=$("fb");
  // if the Pop screen is no longer active (user left, or game ended), do nothing
  if(!p || !p.current || !fb || p.done){ if(p&&p.timeout) clearTimeout(p.timeout); return; }
  const c=p.current;
  if(p.locked) return; p.locked=true;
  clearTimeout(p.timeout);
  document.querySelectorAll('.bubble').forEach(b=>{b.style.animationPlayState='paused'; b.disabled=true;});
  const f=k.facts[c.key]||(k.facts[c.key]={seen:0,wrong:0}); f.seen++;
  if(val===c.ans){ p.score++; award(k,true); fb.textContent=pick(["Pop! 🎉","Got it!","Nice shot!","Boom!"]); fb.className="feedback good"; }
  else { f.wrong++; fb.textContent=`${c.prompt} = ${c.ans}`; fb.className="feedback bad"; }
  p.answered++;
  const unlocked=checkStickers(k); save();
  if(unlocked.length) toast("🎉 New sticker: "+unlocked.join(" "));
  setTimeout(()=>{ p.locked=false; popNext(); }, val===c.ans?700:1300);
}
function popEnd(){
  const k=session.kid, p=session.pop;
  p.done=true; if(p.timeout) clearTimeout(p.timeout);
  k.history.push({date:Date.now(), mode:'pop', topic:"Times tables", score:p.score, total:p.answered, timeSec:Math.round((Date.now()-p.start)/1000)});
  if(k.history.length>200) k.history=k.history.slice(-200);
  const unlocked=checkStickers(k); save();
  app.innerHTML=`
    ${unlocked.length?`<div class="card center" style="border-color:var(--purple)"><h3>🎉 New sticker!</h3><div style="font-size:56px">${unlocked.join(" ")}</div></div>`:''}
    <div class="card center">
      <h2>${p.score>=8?'Sharp shooter! 🎯':p.score>=5?'Nice popping! 🎈':'Keep going! 💪'}</h2>
      <div class="big">${p.score}/${p.answered}</div>
      <div style="margin:14px 0"><div class="statline"><span>⭐ Stars earned</span><b>+${p.score}</b></div>
      <div class="statline"><span>🏅 Total stars</span><b>${k.stars}</b></div></div>
      <button class="btn gold" onclick="startPop()">Play again</button>
      <div style="height:10px"></div>
      <button class="btn ghost" onclick="screenModes()">Back to menu</button>
    </div>`;
}

/* ---- Parent area (code-protected) ---- */
function parentGate(){
  session.parentEntry="";
  drawParentGate("");
}
function drawParentGate(msg){
  const dots=[0,1,2,3,4,5].map(i=>`<div class="dot ${i<session.parentEntry.length?'on':''}"></div>`).join("");
  const keys=[1,2,3,4,5,6,7,8,9,"x",0,"⌫"].map(n=>{
    if(n==="x") return `<div></div>`;
    return `<button class="key" onclick="parentKey('${n}')">${n}</button>`;
  }).join("");
  app.innerHTML=`
    <div class="topbar"><button class="back" onclick="screenProfiles()">‹</button><div class="spacer"></div></div>
    <div class="card center">
      <div style="font-size:44px">🔒</div>
      <h2>Parent area</h2>
      <p class="muted" style="font-size:14px">Enter the 6-digit parent code</p>
      <div class="pin-dots">${dots}</div>
      ${msg?`<p class="feedback bad" style="min-height:0;margin:0 0 10px">${msg}</p>`:''}
      <div class="pad">${keys}</div>
    </div>`;
}
function parentKey(n){
  if(n==="⌫"){ session.parentEntry=session.parentEntry.slice(0,-1); return drawParentGate(""); }
  if(session.parentEntry.length>=6) return;
  session.parentEntry+=n;
  if(session.parentEntry.length===6){
    if(session.parentEntry===PARENT_CODE){ screenManage(); }
    else { session.parentEntry=""; setTimeout(()=>drawParentGate("Wrong code, try again"),120); }
    return;
  }
  drawParentGate("");
}

function screenManage(){
  const list=DB.kids.map(k=>`
    <div class="statline">
      <span>${k.avatar} ${esc(k.name)} <span class="muted">· ⭐${k.stars}</span></span>
      <span><button class="chip" onclick="togglePin('${k.id}',this)" data-pin="${k.pin}">Show PIN</button>
      <button class="chip" onclick="delKid('${k.id}')">Remove</button></span>
    </div>`).join("");
  app.innerHTML=`
    <div class="topbar"><button class="back" onclick="screenProfiles()">‹</button><h2>🔓 Parent area</h2></div>
    <div class="card">
      <h3>Players</h3>
      <div style="margin-top:8px">${list||'<p class="muted">No players yet.</p>'}</div>
    </div>
    <div class="card">
      <h3>About</h3>
      <p class="muted" style="font-size:14px;line-height:1.5">Data is stored only on this device. PINs are hidden by default — tap "Show PIN" to reveal one. Add this page to the home screen for a full-screen, offline app.</p>
    </div>`;
}
function togglePin(id,btn){
  if(btn.textContent==="Show PIN"){ btn.textContent="PIN "+btn.dataset.pin; }
  else { btn.textContent="Show PIN"; }
}
function delKid(id){
  if(!confirm("Remove this player and all their progress?")) return;
  DB.kids=DB.kids.filter(k=>k.id!==id); save(); screenManage();
}

/* utils */
function esc(s){return (s+"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

try {
  screenProfiles();
} catch(err) {
  document.getElementById('app').innerHTML =
    '<div style="padding:24px;color:#eaf2ff;font-family:sans-serif">'+
    '<h2>Something went wrong loading the app</h2>'+
    '<p style="color:#8fa6c4">Please try reopening it in Safari or Chrome (not inside a messaging app).</p>'+
    '<pre style="white-space:pre-wrap;color:#ff6b6b;font-size:12px">'+(err && err.message ? err.message : err)+'</pre></div>';
}
</script>
